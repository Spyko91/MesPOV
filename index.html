        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        * {

            padding: 0;
            box-sizing: border-box;
            font-family: 'Press Start 2P', cursive;
        }

        body {
            background: #000;
            color: #fff;
            font-size: 12px;
            line-height: 1.6;
            position: relative;
        }

        /* Effet scanlines rétro (sera désactivé pendant la vidéo) */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, 
                rgba(0, 0, 0, 0.1) 0px, 
                rgba(255, 255, 0, 0.03) 2px, 
                transparent 3px, 
                transparent 5px);
            pointer-events: none;
            z-index: 9999;
            transition: opacity 0.3s;
        }

        /* Effet de lumière CRT (sera désactivé pendant la vidéo) */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, transparent 0%, rgba(0, 0, 0, 0.4) 100%);
            pointer-events: none;
            z-index: 9998;
            transition: opacity 0.3s;
        }

        /* Désactivation des effets rétro quand le player est actif */
        .video-player.active ~ body::before,
        .video-player.active ~ body::after,
        body:has(.video-player.active)::before,
        body:has(.video-player.active)::after {
            opacity: 0 !important;
            pointer-events: none !important;
        }

        header {
            background: #000;

        // ==================== VIDÉOS PAR DÉFAUT ====================
        // Cette partie crée une première vidéo visible par tout le monde
        let videos = JSON.parse(localStorage.getItem('videos')) || [];
        
        if (videos.length === 0) {
            // Vidéo d'exemple - Remplace par ta propre vidéo !
            videos = [
                {
                    id: 1,
                    title: "Mon premier POV Gaming",
                    description: "Découvre mes meilleurs moments de jeu !",
                    link: "https://www.youtube.com/watch?v=IiCkfXtkxUI",
                    videoId: "IiCkfXtkxUI",
                    date: new Date().toISOString(),
                    views: 0,
                    likes: 0,
                    likedBy: [],
                    categories: ["MMORPG"],
                    comments: []
                }
            ];
            localStorage.setItem('videos', JSON.stringify(videos));
        }

        // ==================== ÉTAT ====================
        let isAdmin = localStorage.getItem('isAdmin') === 'true';
        let currentVideoId = null;
        let player = null;
        let editingIndex = null;
        let currentFilter = {
            search: '',
            category: null
        };

        // ==================== INITIALISATION ====================
        document.addEventListener('DOMContentLoaded', () => {
            initializeVideos();
            updateAdminUI();
            renderCategoriesFilter();
            renderCategoriesSelector();
            filterVideos();
        });

        function initializeVideos() {
            videos = videos.map(video => ({
                ...video,
                likes: video.likes || 0,
                likedBy: video.likedBy || [],
                categories: video.categories || [],
                views: video.views || 0,
                comments: video.comments || []
            }));
            saveVideos();
        }

        // ==================== AUTHENTIFICATION ====================
        function openLoginModal() {
            document.getElementById('loginModal').classList.add('active');
            document.getElementById('adminPassword').value = '';
            document.getElementById('loginError').textContent = '';
        }

        function closeLoginModal() {
            document.getElementById('loginModal').classList.remove('active');
        }

        function checkPassword() {
            const password = document.getElementById('adminPassword').value;
            if (password === ADMIN_PASSWORD) {
                isAdmin = true;
                localStorage.setItem('isAdmin', 'true');
                closeLoginModal();
                updateAdminUI();
                filterVideos();
            } else {
                document.getElementById('loginError').textContent = 'ERREUR';
            }
        }

        function logout() {
            isAdmin = false;
            localStorage.removeItem('isAdmin');
            updateAdminUI();
            filterVideos();
        }

        function updateAdminUI() {
            document.getElementById('userInfo').classList.toggle('admin', isAdmin);
            document.getElementById('loginBtn').style.display = isAdmin ? 'none' : 'block';
            document.getElementById('adminActions').style.display = isAdmin ? 'flex' : 'none';
            document.getElementById('statsDashboard').style.display = isAdmin ? 'block' : 'none';
            
            if (isAdmin) {
                updateStats();
            }
        }

        // ==================== STATISTIQUES ====================
        function updateStats() {
            document.getElementById('totalVideos').textContent = videos.length;
            document.getElementById('totalViews').textContent = videos.reduce((sum, v) => sum + (v.views || 0), 0);
            document.getElementById('totalLikes').textContent = videos.reduce((sum, v) => sum + (v.likes || 0), 0);
            document.getElementById('totalComments').textContent = videos.reduce((sum, v) => sum + (v.comments?.length || 0), 0);

            const topVideos = [...videos].sort((a, b) => (b.views || 0) - (a.views || 0)).slice(0, 5);
            document.getElementById('topVideosList').innerHTML = topVideos.map(v => `
                <div style="margin-bottom:10px; padding:10px; background:#000; border:1px solid #0f0;">
                    <div style="color:#0f0; font-size:7px;">${v.title}</div>
                    <div style="color:#ff0; font-size:6px;">👁️ ${v.views || 0} ❤️ ${v.likes || 0}</div>
                </div>
            `).join('');

            const recent = [...videos].sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 5);
            document.getElementById('recentActivity').innerHTML = recent.map(v => `
                <div style="margin-bottom:10px; padding:10px; background:#000; border:1px solid #ff0;">
                    <div style="color:#ff0; font-size:7px;">${v.title}</div>
                    <div style="color:#0f0; font-size:6px;">📅 ${new Date(v.date).toLocaleDateString()}</div>
                </div>
            `).join('');

            const categoryStats = {};
            CATEGORIES.forEach(cat => categoryStats[cat] = 0);
            videos.forEach(video => {
                video.categories?.forEach(cat => {
                    categoryStats[cat] = (categoryStats[cat] || 0) + 1;
                });
            });

            const maxCount = Math.max(...Object.values(categoryStats));
            document.getElementById('categoryStats').innerHTML = Object.entries(categoryStats)
                .map(([cat, count]) => `
                    <div class="category-stat-item">
                        <span class="category-stat-name">${cat}</span>
                        <div class="category-stat-bar">
                            <div class="category-stat-fill" style="width: ${maxCount ? (count / maxCount * 100) : 0}%"></div>
                        </div>
                        <span class="category-stat-count">${count}</span>
                    </div>
                `).join('');
        }

        function exportStats() {
            const stats = {
                totalVideos: videos.length,
                totalViews: videos.reduce((sum, v) => sum + (v.views || 0), 0),
                totalLikes: videos.reduce((sum, v) => sum + (v.likes || 0), 0),
                videos: videos.map(v => ({
                    title: v.title,
                    views: v.views,
                    likes: v.likes,
                    comments: v.comments?.length || 0,
                    date: v.date
                }))
            };
            
            const blob = new Blob([JSON.stringify(stats, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'stats.json';
            a.click();
        }

        // ==================== FILTRES ====================
        function renderCategoriesFilter() {
            const html = ['<span class="category-tag active" onclick="filterByCategory(null)">TOUS</span>'] + 
                CATEGORIES.map(cat => 
                    `<span class="category-tag" onclick="filterByCategory('${cat}')">${cat}</span>`
                ).join('');
            document.getElementById('categoriesFilter').innerHTML = html;
        }

        function filterByCategory(category) {
            currentFilter.category = category;
            document.querySelectorAll('.category-tag').forEach(el => {
                el.classList.remove('active');
                if ((!category && el.textContent === 'TOUS') || el.textContent === category) {
                    el.classList.add('active');
                }
            });
            filterVideos();
        }

        function filterVideos() {
            const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';
            const filtered = videos.filter(video => {
                const matchesSearch = video.title.toLowerCase().includes(searchTerm) ||
                                    video.description?.toLowerCase().includes(searchTerm);
                const matchesCategory = !currentFilter.category || 
                                      video.categories?.includes(currentFilter.category);
                return matchesSearch && matchesCategory;
            });
            displayVideos(filtered);
        }

        function resetFilters() {
            document.getElementById('searchInput').value = '';
            currentFilter = { search: '', category: null };
            document.querySelectorAll('.category-tag').forEach(el => el.classList.remove('active'));
            document.querySelector('.category-tag').classList.add('active');
            filterVideos();
        }

        // ==================== VIDÉOS ====================
        function renderCategoriesSelector() {
            const html = CATEGORIES.map(cat => `
                <label class="category-checkbox">
                    <input type="checkbox" value="${cat}"> ${cat}
                </label>
            `).join('');
            document.getElementById('categoriesSelector').innerHTML = html;
            document.getElementById('editCategoriesSelector').innerHTML = html;
        }

        function extractVideoId(url) {
            const patterns = [
                /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\n?#]+)/,
                /youtube\.com\/shorts\/([^&\n?#]+)/
            ];
            for (let pattern of patterns) {
                const match = url.match(pattern);
                if (match) return match[1];
            }
            return null;
        }

        function openAddModal() {
            document.getElementById('addVideoModal').classList.add('active');
            document.getElementById('videoTitle').value = '';
            document.getElementById('videoDescription').value = '';
            document.getElementById('youtubeLink').value = '';
            document.querySelectorAll('#categoriesSelector input').forEach(cb => cb.checked = false);
        }

        function closeAddModal() {
            document.getElementById('addVideoModal').classList.remove('active');
        }

        function addVideo() {
            const title = document.getElementById('videoTitle').value.trim();
            const description = document.getElementById('videoDescription').value.trim();
            const link = document.getElementById('youtubeLink').value.trim();

            if (!title || !link) {
                alert('TITRE ET LIEN REQUIS');
                return;
            }

            const videoId = extractVideoId(link);
            if (!videoId) {
                alert('LIEN YOUTUBE INVALIDE');
                return;
            }

            const categories = [];
            document.querySelectorAll('#categoriesSelector input:checked').forEach(cb => {
                categories.push(cb.value);
            });

            const newVideo = {
                id: Date.now(),
                title,
                description,
                link: `https://youtube.com/watch?v=${videoId}`,
                videoId,
                date: new Date().toISOString(),
                views: 0,
                likes: 0,
                likedBy: [],
                categories,
                comments: []
            };

            videos.unshift(newVideo);
            saveVideos();
            closeAddModal();
            if (isAdmin) updateStats();
            filterVideos();
        }

        function openEditModal(index) {
            const video = videos[index];
            editingIndex = index;
            document.getElementById('editVideoTitle').value = video.title;
            document.getElementById('editVideoDescription').value = video.description || '';
            document.querySelectorAll('#editCategoriesSelector input').forEach(cb => {
                cb.checked = video.categories?.includes(cb.value) || false;
            });
            document.getElementById('editVideoModal').classList.add('active');
        }

        function closeEditModal() {
            document.getElementById('editVideoModal').classList.remove('active');
            editingIndex = null;
        }

        function saveEdit() {
            if (editingIndex === null) return;
            const title = document.getElementById('editVideoTitle').value.trim();
            if (!title) {
                alert('TITRE REQUIS');
                return;
            }

            const categories = [];
            document.querySelectorAll('#editCategoriesSelector input:checked').forEach(cb => {
                categories.push(cb.value);
            });

            videos[editingIndex] = {
                ...videos[editingIndex],
                title,
                description: document.getElementById('editVideoDescription').value.trim(),
                categories
            };

            saveVideos();
            closeEditModal();
            if (isAdmin) updateStats();
            filterVideos();
        }

        function deleteVideo(index) {
            if (confirm('SUPPRIMER ?')) {
                videos.splice(index, 1);
                saveVideos();
                if (isAdmin) updateStats();
                filterVideos();
            }
        }

        // ==================== LIKES ====================
        function toggleLike(videoIndex) {
            const video = videos[videoIndex];
            const viewerId = 'visitor_' + (localStorage.getItem('visitorId') || Date.now());
            
            if (!localStorage.getItem('visitorId')) {
                localStorage.setItem('visitorId', viewerId);
            }

            if (video.likedBy?.includes(viewerId)) {
                video.likes = (video.likes || 1) - 1;
                video.likedBy = video.likedBy.filter(id => id !== viewerId);
            } else {
                video.likes = (video.likes || 0) + 1;
                if (!video.likedBy) video.likedBy = [];
                video.likedBy.push(viewerId);
            }

            saveVideos();
            if (isAdmin) updateStats();
            filterVideos();
        }

        // ==================== VUES ====================
        function incrementViews(index) {
            videos[index].views = (videos[index].views || 0) + 1;
            saveVideos();
            if (isAdmin) updateStats();
        }

        // ==================== COMMENTAIRES ====================
        function addComment(videoIndex) {
            const input = document.getElementById(`comment-${videoIndex}`);
            const text = input.value.trim();
            if (!text) return;

            const comment = {
                id: Date.now(),
                author: "JOUEUR",
                text,
                date: new Date().toLocaleString()
            };

            if (!videos[videoIndex].comments) {
                videos[videoIndex].comments = [];
            }

            videos[videoIndex].comments.push(comment);
            saveVideos();
            input.value = '';
            if (isAdmin) updateStats();
            filterVideos();
        }

        function deleteComment(videoIndex, commentId) {
            if (!isAdmin) return;
            videos[videoIndex].comments = videos[videoIndex].comments.filter(c => c.id !== commentId);
            saveVideos();
            updateStats();
            filterVideos();
        }

        // ==================== LECTEUR ====================
        function loadYouTubeAPI() {
            if (!document.getElementById('youtube-api')) {
                const tag = document.createElement('script');
                tag.id = 'youtube-api';
                tag.src = 'https://www.youtube.com/iframe_api';
                document.head.appendChild(tag);
            }
        }

        window.onYouTubeIframeAPIReady = function() {
            if (currentVideoId) {
                initPlayer(currentVideoId);
            }
        };

        function initPlayer(videoId) {
            if (!window.YT) {
                currentVideoId = videoId;
                return;
            }
            if (player) player.destroy();
            player = new YT.Player('youtube-player', {
                videoId: videoId,
                events: { 'onReady': (event) => event.target.playVideo() }
            });
        }

        function playVideo(index) {
            const video = videos[index];
            if (!video) return;
            incrementViews(index);
            document.getElementById('videoPlayer').classList.add('active');
            loadYouTubeAPI();
            initPlayer(video.videoId);
        }

        function closePlayer() {
            document.getElementById('videoPlayer').classList.remove('active');
            if (player) player.stopVideo();
        }

        // ==================== AFFICHAGE ====================
        function displayVideos(videosToShow) {
            const grid = document.getElementById('videosGrid');
            const viewerId = localStorage.getItem('visitorId');
            
            if (!videosToShow || videosToShow.length === 0) {
                grid.innerHTML = `
                    <div class="no-videos">
                        <h2>🎮 AUCUNE VIDÉO</h2>
                        ${isAdmin ? '<button class="add-video-btn" onclick="openAddModal()">PUBLIER</button>' : ''}
                    </div>
                `;
                return;
            }

            grid.innerHTML = videosToShow.map((video, idx) => {
                const originalIndex = videos.findIndex(v => v.id === video.id);
                const hasLiked = viewerId && video.likedBy?.includes(viewerId);
                
                return `
                    <div class="video-card">
                        <div class="thumbnail-container" onclick="playVideo(${originalIndex})">
                            <img class="thumbnail" src="https://img.youtube.com/vi/${video.videoId}/hqdefault.jpg" 
                                 onerror="this.src='https://img.youtube.com/vi/${video.videoId}/mqdefault.jpg'; this.onerror=null;">
                            <div class="play-overlay">
                                <div class="play-button">▶</div>
                            </div>
                            ${video.categories?.length ? `
                                <div class="video-categories">
                                    ${video.categories.map(cat => 
                                        `<span class="video-category-badge">${cat}</span>`
                                    ).join('')}
                                </div>
                            ` : ''}
                        </div>
                        
                        <div class="video-info">
                            <h3 class="video-title" onclick="playVideo(${originalIndex})">${video.title}</h3>
                            <p class="video-description">${video.description || 'PAS DE DESCRIPTION'}</p>
                            
                            <div class="video-meta">
                                <span class="video-views">👁️ ${video.views || 0}</span>
                                <span>📅 ${new Date(video.date).toLocaleDateString()}</span>
                            </div>

                            <div class="video-stats">
                                <div class="like-button ${hasLiked ? 'liked' : ''}" onclick="toggleLike(${originalIndex})">
                                    <span>❤️</span>
                                    <span>${video.likes || 0}</span>
                                </div>
                            </div>

                            ${isAdmin ? `
                                <div class="admin-controls show">
                                    <button class="edit-btn" onclick="openEditModal(${originalIndex})">✏️ MODIF</button>
                                    <button class="delete-btn" onclick="deleteVideo(${originalIndex})">🗑️ SUP</button>
                                </div>
                            ` : ''}

                            <div class="comments-section">
                                <div class="comments-title">💬 COMMS (${video.comments?.length || 0})</div>
                                
                                <div class="comment-form">
                                    <input type="text" class="comment-input" id="comment-${originalIndex}" 
                                           placeholder="COMMENTAIRE..." 
                                           onkeypress="if(event.key==='Enter') addComment(${originalIndex})">
                                    <button class="comment-submit" onclick="addComment(${originalIndex})">→</button>
                                </div>

                                <div class="comments-list">
                                    ${video.comments?.map(comment => `
                                        <div class="comment">
                                            <div class="comment-header">
                                                <span class="comment-author">${comment.author}</span>
                                                <span class="comment-date">${comment.date}</span>
                                                ${isAdmin ? `
                                                    <span class="delete-comment" onclick="deleteComment(${originalIndex}, ${comment.id})">✕</span>
                                                ` : ''}
                                            </div>
                                            <div class="comment-text">${comment.text}</div>
                                        </div>
                                    `).join('') || ''}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function saveVideos() {
            localStorage.setItem('videos', JSON.stringify(videos));
        }

        window.onclick = (event) => {
            if (event.target.classList.contains('modal')) {
                event.target.classList.remove('active');
            }
        };
    </script>
</body>
</html>
