<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Chaîne Créative - Administration Complète</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        /* En-tête */
        header {
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        /* Barre de recherche et filtres */
        .search-section {
            flex: 1;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .search-bar {
            display: flex;
            gap: 10px;
        }

        .search-bar input {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 16px;
        }

        .categories-filter {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .category-tag {
            padding: 5px 15px;
            background: #f0f0f0;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }

        .category-tag:hover {
            background: #667eea;
            color: white;
        }

        .category-tag.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        /* Section utilisateur */
        .user-section {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .login-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
        }

        .user-info {
            display: none;
            align-items: center;
            gap: 15px;
        }

        .user-info.admin {
            display: flex;
        }

        .user-badge {
            background: linear-gradient(135deg, #00b09b, #96c93d);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
        }

        /* Dashboard statistiques */
        .stats-dashboard {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin: 20px auto;
            max-width: 1400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .stats-title {
            font-size: 24px;
            margin-bottom: 20px;
            color: #333;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-value {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }

        .stats-charts {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-container {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 15px;
        }

        .chart-title {
            font-size: 18px;
            margin-bottom: 15px;
            color: #333;
        }

        .category-stats {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 15px;
        }

        .category-stat-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .category-stat-name {
            width: 120px;
            color: #666;
        }

        .category-stat-bar {
            flex: 1;
            height: 10px;
            background: #ddd;
            border-radius: 5px;
            overflow: hidden;
        }

        .category-stat-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 5px;
        }

        .category-stat-count {
            width: 50px;
            text-align: right;
            color: #666;
        }

        /* Admin actions */
        .admin-actions {
            max-width: 1400px;
            margin: 20px auto;
            padding: 0 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .add-video-btn {
            padding: 12px 25px;
            background: linear-gradient(135deg, #00b09b, #96c93d);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .export-btn {
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
        }

        /* Modals */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-content h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .modal-content input,
        .modal-content textarea,
        .modal-content select {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }

        .categories-selector {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .category-checkbox {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Grille des vidéos */
        .videos-container {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
        }

        /* Carte vidéo */
        .video-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .video-card:hover {
            transform: translateY(-10px);
        }

        .thumbnail-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background: #f0f0f0;
            overflow: hidden;
            cursor: pointer;
        }

        .thumbnail {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .thumbnail-container:hover .play-overlay {
            opacity: 1;
        }

        .play-button {
            width: 60px;
            height: 60px;
            background: rgba(255,0,0,0.9);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 24px;
        }

        .video-categories {
            position: absolute;
            top: 10px;
            left: 10px;
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        .video-category-badge {
            padding: 4px 8px;
            background: rgba(0,0,0,0.7);
            color: white;
            border-radius: 12px;
            font-size: 10px;
        }

        .video-info {
            padding: 20px;
        }

        .video-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
            cursor: pointer;
        }

        .video-description {
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
        }

        .video-meta {
            display: flex;
            align-items: center;
            gap: 20px;
            color: #888;
            font-size: 13px;
            margin-bottom: 15px;
        }

        .video-stats {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .like-button {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 15px;
            transition: all 0.3s;
        }

        .like-button:hover {
            background: #f0f0f0;
        }

        .like-button.liked {
            color: #ff4444;
        }

        .like-button.liked .like-icon {
            transform: scale(1.1);
        }

        .admin-controls {
            display: none;
            gap: 10px;
            margin-top: 15px;
        }

        .admin-controls.show {
            display: flex;
        }

        .delete-btn {
            padding: 8px 15px;
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .edit-btn {
            padding: 8px 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        /* Commentaires */
        .comments-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #f0f0f0;
        }

        .comments-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
        }

        .comment-form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .comment-input {
            flex: 1;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 20px;
        }

        .comment-submit {
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }

        .comments-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .comment {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .comment-author {
            font-weight: bold;
            color: #333;
        }

        .comment-date {
            font-size: 12px;
            color: #888;
        }

        .delete-comment {
            color: #ff4444;
            cursor: pointer;
            margin-left: 10px;
        }

        /* Lecteur vidéo */
        .video-player {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 3000;
            justify-content: center;
            align-items: center;
        }

        .video-player.active {
            display: flex;
        }

        .player-container {
            position: relative;
            width: 90%;
            max-width: 1000px;
            background: black;
            border-radius: 20px;
            overflow: hidden;
        }

        .close-player {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            z-index: 10;
        }

        .player-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
        }

        #youtube-player {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .stats-charts {
                grid-template-columns: 1fr;
            }
            
            .videos-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo" onclick="resetFilters()">
                <span>🎬</span>
                <span>Ma Chaîne Créative</span>
            </div>
            
            <div class="search-section">
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="Rechercher une vidéo..." onkeyup="filterVideos()">
                </div>
                <div class="categories-filter" id="categoriesFilter"></div>
            </div>
            
            <div class="user-section">
                <div class="user-info" id="userInfo">
                    <span class="user-badge">👑 Admin</span>
                    <button class="logout-btn" onclick="logout()">Déconnexion</button>
                </div>
                <button class="login-btn" id="loginBtn" onclick="openLoginModal()">Connexion Admin</button>
            </div>
        </div>
    </header>

    <!-- Dashboard statistiques (visible seulement pour admin) -->
    <div id="statsDashboard" style="display: none;">
        <div class="stats-dashboard">
            <h2 class="stats-title">📊 Tableau de bord</h2>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="totalVideos">0</div>
                    <div class="stat-label">Vidéos totales</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalViews">0</div>
                    <div class="stat-label">Vues totales</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalLikes">0</div>
                    <div class="stat-label">Likes totaux</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalComments">0</div>
                    <div class="stat-label">Commentaires</div>
                </div>
            </div>

            <div class="stats-charts">
                <div class="chart-container">
                    <h3 class="chart-title">Top vidéos (vues)</h3>
                    <div id="topVideosList"></div>
                </div>
                
                <div class="chart-container">
                    <h3 class="chart-title">Activité récente</h3>
                    <div id="recentActivity"></div>
                </div>
            </div>

            <div class="category-stats">
                <h3 class="chart-title">Répartition par catégorie</h3>
                <div id="categoryStats"></div>
            </div>
        </div>
    </div>

    <!-- Actions admin -->
    <div class="admin-actions" id="adminActions" style="display: none;">
        <button class="add-video-btn" onclick="openAddModal()">
            <span>➕</span> Publier une vidéo
        </button>
        <button class="export-btn" onclick="exportStats()">
            📊 Exporter les statistiques
        </button>
    </div>

    <!-- Modal de connexion -->
    <div class="modal" id="loginModal">
        <div class="modal-content">
            <h2>Connexion Administrateur</h2>
            <div class="error-message" id="loginError"></div>
            <input type="password" id="adminPassword" placeholder="Mot de passe">
            <div class="modal-buttons">
                <button class="cancel-btn" onclick="closeLoginModal()">Annuler</button>
                <button class="login-submit" onclick="checkPassword()">Se connecter</button>
            </div>
        </div>
    </div>

    <!-- Modal d'ajout de vidéo -->
    <div class="modal" id="addVideoModal">
        <div class="modal-content">
            <h2>Ajouter une vidéo</h2>
            <input type="text" id="videoTitle" placeholder="Titre">
            <textarea id="videoDescription" placeholder="Description"></textarea>
            <input type="text" id="youtubeLink" placeholder="Lien YouTube">
            
            <h3 style="margin: 10px 0;">Catégories</h3>
            <div class="categories-selector" id="categoriesSelector"></div>
            
            <div class="modal-buttons">
                <button class="cancel-btn" onclick="closeAddModal()">Annuler</button>
                <button class="save-btn" onclick="addVideo()">Ajouter</button>
            </div>
        </div>
    </div>

    <!-- Modal d'édition -->
    <div class="modal" id="editVideoModal">
        <div class="modal-content">
            <h2>Modifier la vidéo</h2>
            <input type="text" id="editVideoTitle" placeholder="Titre">
            <textarea id="editVideoDescription" placeholder="Description"></textarea>
            
            <h3 style="margin: 10px 0;">Catégories</h3>
            <div class="categories-selector" id="editCategoriesSelector"></div>
            
            <div class="modal-buttons">
                <button class="cancel-btn" onclick="closeEditModal()">Annuler</button>
                <button class="save-btn" onclick="saveEdit()">Enregistrer</button>
            </div>
        </div>
    </div>

    <!-- Lecteur vidéo -->
    <div class="video-player" id="videoPlayer">
        <div class="player-container">
            <button class="close-player" onclick="closePlayer()">✕</button>
            <div class="player-wrapper">
                <div id="youtube-player"></div>
            </div>
        </div>
    </div>

    <!-- Grille des vidéos -->
    <div class="videos-container">
        <div class="videos-grid" id="videosGrid"></div>
    </div>

    <script>
        // ==================== CONFIGURATION ====================
        const ADMIN_PASSWORD = "admin123";
        const CATEGORIES = [
            "Vlog",
            "Tutoriel",
            "Gaming", 
            "Musique",
            "Sport",
            "Cuisine",
            "Voyage",
            "Technologie",
            "Mode",
            "Éducation"
        ];

        // ==================== ÉTAT ====================
        let videos = JSON.parse(localStorage.getItem('videos')) || [];
        let isAdmin = localStorage.getItem('isAdmin') === 'true';
        let currentVideoId = null;
        let player = null;
        let editingIndex = null;
        let currentFilter = {
            search: '',
            category: null
        };

        // ==================== INITIALISATION ====================
        document.addEventListener('DOMContentLoaded', () => {
            initializeVideos();
            updateAdminUI();
            renderCategoriesFilter();
            renderCategoriesSelector();
            filterVideos();
        });

        function initializeVideos() {
            videos = videos.map(video => ({
                ...video,
                likes: video.likes || 0,
                likedBy: video.likedBy || [],
                categories: video.categories || [],
                views: video.views || 0,
                comments: video.comments || []
            }));
            saveVideos();
        }

        // ==================== AUTHENTIFICATION ====================
        function openLoginModal() {
            document.getElementById('loginModal').classList.add('active');
        }

        function closeLoginModal() {
            document.getElementById('loginModal').classList.remove('active');
        }

        function checkPassword() {
            const password = document.getElementById('adminPassword').value;
            if (password === ADMIN_PASSWORD) {
                isAdmin = true;
                localStorage.setItem('isAdmin', 'true');
                closeLoginModal();
                updateAdminUI();
                filterVideos();
            } else {
                alert('Mot de passe incorrect');
            }
        }

        function logout() {
            isAdmin = false;
            localStorage.removeItem('isAdmin');
            updateAdminUI();
            filterVideos();
        }

        function updateAdminUI() {
            document.getElementById('userInfo').classList.toggle('admin', isAdmin);
            document.getElementById('loginBtn').style.display = isAdmin ? 'none' : 'block';
            document.getElementById('adminActions').style.display = isAdmin ? 'flex' : 'none';
            document.getElementById('statsDashboard').style.display = isAdmin ? 'block' : 'none';
            
            if (isAdmin) {
                updateStats();
            }
        }

        // ==================== STATISTIQUES ====================
        function updateStats() {
            // Stats globales
            document.getElementById('totalVideos').textContent = videos.length;
            document.getElementById('totalViews').textContent = videos.reduce((sum, v) => sum + (v.views || 0), 0);
            document.getElementById('totalLikes').textContent = videos.reduce((sum, v) => sum + (v.likes || 0), 0);
            document.getElementById('totalComments').textContent = videos.reduce((sum, v) => sum + (v.comments?.length || 0), 0);

            // Top vidéos
            const topVideos = [...videos].sort((a, b) => (b.views || 0) - (a.views || 0)).slice(0, 5);
            document.getElementById('topVideosList').innerHTML = topVideos.map(v => `
                <div style="margin-bottom: 10px; padding: 10px; background: white; border-radius: 10px;">
                    <strong>${v.title}</strong><br>
                    <small>👁️ ${v.views || 0} vues | ❤️ ${v.likes || 0} likes</small>
                </div>
            `).join('');

            // Activité récente
            const recent = [...videos].sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 5);
            document.getElementById('recentActivity').innerHTML = recent.map(v => `
                <div style="margin-bottom: 10px; padding: 10px; background: white; border-radius: 10px;">
                    <strong>${v.title}</strong><br>
                    <small>📅 ${new Date(v.date).toLocaleDateString()}</small>
                </div>
            `).join('');

            // Stats par catégorie
            const categoryStats = {};
            CATEGORIES.forEach(cat => categoryStats[cat] = 0);
            
            videos.forEach(video => {
                video.categories?.forEach(cat => {
                    categoryStats[cat] = (categoryStats[cat] || 0) + 1;
                });
            });

            const maxCount = Math.max(...Object.values(categoryStats));
            document.getElementById('categoryStats').innerHTML = Object.entries(categoryStats)
                .map(([cat, count]) => `
                    <div class="category-stat-item">
                        <span class="category-stat-name">${cat}</span>
                        <div class="category-stat-bar">
                            <div class="category-stat-fill" style="width: ${maxCount ? (count / maxCount * 100) : 0}%"></div>
                        </div>
                        <span class="category-stat-count">${count}</span>
                    </div>
                `).join('');
        }

        function exportStats() {
            const stats = {
                totalVideos: videos.length,
                totalViews: videos.reduce((sum, v) => sum + (v.views || 0), 0),
                totalLikes: videos.reduce((sum, v) => sum + (v.likes || 0), 0),
                videos: videos.map(v => ({
                    title: v.title,
                    views: v.views,
                    likes: v.likes,
                    comments: v.comments?.length || 0,
                    date: v.date
                }))
            };
            
            const blob = new Blob([JSON.stringify(stats, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'statistiques.json';
            a.click();
        }

        // ==================== FILTRES ====================
        function renderCategoriesFilter() {
            const html = ['<span class="category-tag active" onclick="filterByCategory(null)">Tous</span>'] + 
                CATEGORIES.map(cat => 
                    `<span class="category-tag" onclick="filterByCategory('${cat}')">${cat}</span>`
                ).join('');
            document.getElementById('categoriesFilter').innerHTML = html;
        }

        function filterByCategory(category) {
            currentFilter.category = category;
            
            // Mise à jour visuelle
            document.querySelectorAll('.category-tag').forEach(el => {
                el.classList.remove('active');
                if ((!category && el.textContent === 'Tous') || el.textContent === category) {
                    el.classList.add('active');
                }
            });
            
            filterVideos();
        }

        function filterVideos() {
            const searchTerm = document.getElementById('searchInput')?.value.toLowerCase() || '';
            
            const filtered = videos.filter(video => {
                const matchesSearch = video.title.toLowerCase().includes(searchTerm) ||
                                    video.description?.toLowerCase().includes(searchTerm);
                const matchesCategory = !currentFilter.category || 
                                      video.categories?.includes(currentFilter.category);
                return matchesSearch && matchesCategory;
            });
            
            displayVideos(filtered);
        }

        function resetFilters() {
            document.getElementById('searchInput').value = '';
            currentFilter = { search: '', category: null };
            document.querySelectorAll('.category-tag').forEach(el => el.classList.remove('active'));
            document.querySelector('.category-tag').classList.add('active');
            filterVideos();
        }

        // ==================== GESTION DES VIDÉOS ====================
        function renderCategoriesSelector() {
            const html = CATEGORIES.map(cat => `
                <label class="category-checkbox">
                    <input type="checkbox" value="${cat}"> ${cat}
                </label>
            `).join('');
            
            document.getElementById('categoriesSelector').innerHTML = html;
            document.getElementById('editCategoriesSelector').innerHTML = html;
        }

        function extractVideoId(url) {
            const patterns = [
                /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\n?#]+)/,
                /youtube\.com\/shorts\/([^&\n?#]+)/
            ];
            
            for (let pattern of patterns) {
                const match = url.match(pattern);
                if (match) return match[1];
            }
            return null;
        }

        function openAddModal() {
            document.getElementById('addVideoModal').classList.add('active');
            
            // Reset form
            document.getElementById('videoTitle').value = '';
            document.getElementById('videoDescription').value = '';
            document.getElementById('youtubeLink').value = '';
            document.querySelectorAll('#categoriesSelector input').forEach(cb => cb.checked = false);
        }

        function closeAddModal() {
            document.getElementById('addVideoModal').classList.remove('active');
        }

        function addVideo() {
            const title = document.getElementById('videoTitle').value.trim();
            const description = document.getElementById('videoDescription').value.trim();
            const link = document.getElementById('youtubeLink').value.trim();

            if (!title || !link) {
                alert('Titre et lien requis');
                return;
            }

            const videoId = extractVideoId(link);
            if (!videoId) {
                alert('Lien YouTube invalide');
                return;
            }

            // Récupérer les catégories sélectionnées
            const categories = [];
            document.querySelectorAll('#categoriesSelector input:checked').forEach(cb => {
                categories.push(cb.value);
            });

            const newVideo = {
                id: Date.now(),
                title,
                description,
                link: `https://youtube.com/watch?v=${videoId}`,
                videoId,
                date: new Date().toISOString(),
                views: 0,
                likes: 0,
                likedBy: [],
                categories,
                comments: []
            };

            videos.unshift(newVideo);
            saveVideos();
            closeAddModal();
            
            if (isAdmin) updateStats();
            filterVideos();
        }

        function openEditModal(index) {
            const video = videos[index];
            editingIndex = index;
            
            document.getElementById('editVideoTitle').value = video.title;
            document.getElementById('editVideoDescription').value = video.description || '';
            
            // Cocher les catégories existantes
            document.querySelectorAll('#editCategoriesSelector input').forEach(cb => {
                cb.checked = video.categories?.includes(cb.value) || false;
            });
            
            document.getElementById('editVideoModal').classList.add('active');
        }

        function closeEditModal() {
            document.getElementById('editVideoModal').classList.remove('active');
            editingIndex = null;
        }

        function saveEdit() {
            if (editingIndex === null) return;
            
            const title = document.getElementById('editVideoTitle').value.trim();
            if (!title) {
                alert('Le titre est requis');
                return;
            }

            // Récupérer les catégories sélectionnées
            const categories = [];
            document.querySelectorAll('#editCategoriesSelector input:checked').forEach(cb => {
                categories.push(cb.value);
            });

            videos[editingIndex] = {
                ...videos[editingIndex],
                title,
                description: document.getElementById('editVideoDescription').value.trim(),
                categories
            };

            saveVideos();
            closeEditModal();
            
            if (isAdmin) updateStats();
            filterVideos();
        }

        function deleteVideo(index) {
            if (confirm('Supprimer cette vidéo ?')) {
                videos.splice(index, 1);
                saveVideos();
                
                if (isAdmin) updateStats();
                filterVideos();
            }
        }

        // ==================== LIKES ====================
        function toggleLike(videoIndex) {
            const video = videos[videoIndex];
            const viewerId = 'visitor_' + (localStorage.getItem('visitorId') || Date.now());
            
            if (!localStorage.getItem('visitorId')) {
                localStorage.setItem('visitorId', viewerId);
            }

            if (video.likedBy?.includes(viewerId)) {
                // Unlike
                video.likes = (video.likes || 1) - 1;
                video.likedBy = video.likedBy.filter(id => id !== viewerId);
            } else {
                // Like
                video.likes = (video.likes || 0) + 1;
                if (!video.likedBy) video.likedBy = [];
                video.likedBy.push(viewerId);
            }

            saveVideos();
            
            if (isAdmin) updateStats();
            filterVideos();
        }

        // ==================== VUES ====================
        function incrementViews(index) {
            videos[index].views = (videos[index].views || 0) + 1;
            saveVideos();
            
            if (isAdmin) updateStats();
        }

        // ==================== COMMENTAIRES ====================
        function addComment(videoIndex) {
            const input = document.getElementById(`comment-${videoIndex}`);
            const text = input.value.trim();
            
            if (!text) return;

            const comment = {
                id: Date.now(),
                author: "Visiteur",
                text,
                date: new Date().toLocaleString()
            };

            if (!videos[videoIndex].comments) {
                videos[videoIndex].comments = [];
            }

            videos[videoIndex].comments.push(comment);
            saveVideos();
            
            input.value = '';
            
            if (isAdmin) updateStats();
            filterVideos();
        }

        function deleteComment(videoIndex, commentId) {
            if (!isAdmin) return;
            
            videos[videoIndex].comments = videos[videoIndex].comments.filter(c => c.id !== commentId);
            saveVideos();
            
            updateStats();
            filterVideos();
        }

        // ==================== LECTEUR VIDÉO ====================
        function loadYouTubeAPI() {
            if (!document.getElementById('youtube-api')) {
                const tag = document.createElement('script');
                tag.id = 'youtube-api';
                tag.src = 'https://www.youtube.com/iframe_api';
                document.head.appendChild(tag);
            }
        }

        window.onYouTubeIframeAPIReady = function() {
            if (currentVideoId) {
                initPlayer(currentVideoId);
            }
        };

        function initPlayer(videoId) {
            if (!window.YT) {
                currentVideoId = videoId;
                return;
            }
            
            if (player) player.destroy();
            
            player = new YT.Player('youtube-player', {
                videoId: videoId,
                events: { 'onReady': (event) => event.target.playVideo() }
            });
        }

        function playVideo(index) {
            const video = videos[index];
            if (!video) return;

            incrementViews(index);
            
            document.getElementById('videoPlayer').classList.add('active');
            loadYouTubeAPI();
            initPlayer(video.videoId);
        }

        function closePlayer() {
            document.getElementById('videoPlayer').classList.remove('active');
            if (player) player.stopVideo();
        }

        // ==================== AFFICHAGE ====================
        function displayVideos(videosToShow) {
            const grid = document.getElementById('videosGrid');
            const viewerId = localStorage.getItem('visitorId');
            
            if (!videosToShow || videosToShow.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 60px; background: white; border-radius: 20px;">
                        <h2>Aucune vidéo trouvée</h2>
                    </div>
                `;
                return;
            }

            grid.innerHTML = videosToShow.map((video, idx) => {
                const originalIndex = videos.findIndex(v => v.id === video.id);
                const hasLiked = viewerId && video.likedBy?.includes(viewerId);
                
                return `
                    <div class="video-card">
                        <div class="thumbnail-container" onclick="playVideo(${originalIndex})">
                            <img class="thumbnail" src="https://img.youtube.com/vi/${video.videoId}/maxresdefault.jpg" 
                                 onerror="this.src='https://img.youtube.com/vi/${video.videoId}/hqdefault.jpg'">
                            <div class="play-overlay">
                                <div class="play-button">▶</div>
                            </div>
                            ${video.categories?.length ? `
                                <div class="video-categories">
                                    ${video.categories.map(cat => 
                                        `<span class="video-category-badge">${cat}</span>`
                                    ).join('')}
                                </div>
                            ` : ''}
                        </div>
                        
                        <div class="video-info">
                            <h3 class="video-title" onclick="playVideo(${originalIndex})">${video.title}</h3>
                            <p class="video-description">${video.description || 'Aucune description'}</p>
                            
                            <div class="video-meta">
                                <span class="video-views">👁️ ${video.views || 0}</span>
                                <span>📅 ${new Date(video.date).toLocaleDateString()}</span>
                            </div>

                            <div class="video-stats">
                                <div class="like-button ${hasLiked ? 'liked' : ''}" onclick="toggleLike(${originalIndex})">
                                    <span class="like-icon">❤️</span>
                                    <span>${video.likes || 0}</span>
                                </div>
                            </div>

                            ${isAdmin ? `
                                <div class="admin-controls show">
                                    <button class="edit-btn" onclick="openEditModal(${originalIndex})">✏️ Modifier</button>
                                    <button class="delete-btn" onclick="deleteVideo(${originalIndex})">🗑️ Supprimer</button>
                                </div>
                            ` : ''}

                            <div class="comments-section">
                                <div class="comments-title">💬 Commentaires (${video.comments?.length || 0})</div>
                                
                                <div class="comment-form">
                                    <input type="text" class="comment-input" id="comment-${originalIndex}" 
                                           placeholder="Ajouter un commentaire..." 
                                           onkeypress="if(event.key==='Enter') addComment(${originalIndex})">
                                    <button class="comment-submit" onclick="addComment(${originalIndex})">Envoyer</button>
                                </div>

                                <div class="comments-list">
                                    ${video.comments?.map(comment => `
                                        <div class="comment">
                                            <div class="comment-header">
                                                <span class="comment-author">${comment.author}</span>
                                                <span class="comment-date">${comment.date}</span>
                                                ${isAdmin ? `
                                                    <span class="delete-comment" onclick="deleteComment(${originalIndex}, ${comment.id})">🗑️</span>
                                                ` : ''}
                                            </div>
                                            <div class="comment-text">${comment.text}</div>
                                        </div>
                                    `).join('') || ''}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function saveVideos() {
            localStorage.setItem('videos', JSON.stringify(videos));
        }

        // Fermer les modals en cliquant dehors
        window.onclick = (event) => {
            if (event.target.classList.contains('modal')) {
                event.target.classList.remove('active');
            }
        };
    </script>
</body>
</html>
