<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spyko.ytb - Mes POV Gaming</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Press Start 2P', cursive;
        }

        body {
            background: #000;
            color: #fff;
            font-size: 12px;
            line-height: 1.6;
            position: relative;
        }

        /* Effet scanlines rétro (sera désactivé pendant la vidéo) */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, 
                rgba(0, 0, 0, 0.1) 0px, 
                rgba(255, 255, 0, 0.03) 2px, 
                transparent 3px, 
                transparent 5px);
            pointer-events: none;
            z-index: 9999;
            transition: opacity 0.3s;
        }

        /* Effet de lumière CRT (sera désactivé pendant la vidéo) */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, transparent 0%, rgba(0, 0, 0, 0.4) 100%);
            pointer-events: none;
            z-index: 9998;
            transition: opacity 0.3s;
        }

        /* Désactivation des effets rétro quand le player est actif */
        .video-player.active ~ body::before,
        .video-player.active ~ body::after,
        body:has(.video-player.active)::before,
        body:has(.video-player.active)::after {
            opacity: 0 !important;
            pointer-events: none !important;
        }

        /* Animations pour le message d'abonnement */
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        @keyframes glow {
            0%, 100% { text-shadow: 0 0 5px #0f0; }
            50% { text-shadow: 0 0 15px #0f0, 0 0 30px #0f0; }
        }

        @keyframes arrowBounce {
            0%, 100% { transform: rotate(-10deg) translateX(0); }
            50% { transform: rotate(-10deg) translateX(-5px); }
        }

        .subscribe-prompt {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
            animation: bounce 1s infinite;
        }

        .subscribe-arrow {
            color: #ff0;
            font-size: 14px;
            transform: rotate(-10deg);
            animation: arrowBounce 0.8s infinite;
            filter: drop-shadow(0 0 5px #ff0);
        }

        .subscribe-text {
            color: #0f0;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1px;
            animation: glow 1.5s infinite;
            background: rgba(0, 0, 0, 0.5);
            padding: 3px 8px;
            border-radius: 10px;
            border: 1px solid #0f0;
        }

        .subscribe-text:hover {
            background: #0f0;
            color: #000;
            transform: scale(1.05);
        }

        header {
            background: #000;
            border-bottom: 4px solid #ff0;
            padding: 20px;
            image-rendering: pixelated;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo {
            font-size: 16px;
            color: #ff0;
            text-transform: uppercase;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: all 0.2s;
            text-shadow: 2px 2px 0 #f00;
        }

        .logo:hover {
            color: #f00;
            text-shadow: 2px 2px 0 #ff0;
        }

        .logo span:first-child {
            font-size: 32px;
            color: #ff0000;
            filter: drop-shadow(0 0 10px #ff0000);
            transition: all 0.3s;
        }

        .logo:hover span:first-child {
            filter: drop-shadow(0 0 20px #ff0000);
            transform: scale(1.1);
        }

        /* Section recherche et filtres */
        .search-section {
            flex: 1;
            max-width: 500px;
        }

        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .search-bar input {
            flex: 1;
            padding: 10px;
            background: #111;
            border: 2px solid #ff0;
            color: #ff0;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
        }

        .search-bar input::placeholder {
            color: #660;
        }

        .categories-filter {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        .category-tag {
            display: inline-block;
            background: #000;
            border: 2px solid #0f0;
            color: #0f0;
            padding: 5px 10px;
            margin: 2px;
            font-size: 8px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .category-tag:hover {
            background: #0f0;
            color: #000;
            box-shadow: 0 0 10px #0f0;
        }

        .category-tag.active {
            background: #0f0;
            color: #000;
        }

        /* Section utilisateur */
        .user-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .login-btn {
            background: #000;
            border: 2px solid #ff0;
            color: #ff0;
            padding: 8px 15px;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .login-btn:hover {
            background: #ff0;
            color: #000;
        }

        .user-info {
            display: none;
            align-items: center;
            gap: 10px;
        }

        .user-info.admin {
            display: flex;
        }

        .user-badge {
            background: #ff0;
            color: #000;
            padding: 5px 10px;
            font-size: 8px;
            border: 2px solid #f00;
        }

        .logout-btn {
            background: #f00;
            border: 2px solid #ff0;
            color: #fff;
            padding: 5px 10px;
            font-family: 'Press Start 2P', cursive;
            font-size: 8px;
            cursor: pointer;
        }

        /* Dashboard stats */
        .stats-dashboard {
            background: #000;
            border: 4px solid #ff0;
            padding: 20px;
            margin: 20px auto;
            max-width: 1400px;
            image-rendering: pixelated;
            position: relative;
        }

        .stats-dashboard::before {
            content: "★ STATS ★";
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            background: #000;
            color: #ff0;
            padding: 5px 20px;
            font-size: 12px;
            border: 2px solid #ff0;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #111;
            border: 2px solid #ff0;
            padding: 15px;
            text-align: center;
            color: #ff0;
        }

        .stat-value {
            font-size: 24px;
            color: #0f0;
            margin: 10px 0;
            text-shadow: 0 0 10px #0f0;
        }

        .stat-label {
            font-size: 8px;
            color: #ff0;
        }

        .stats-charts {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .chart-container {
            background: #111;
            border: 2px solid #0f0;
            padding: 15px;
        }

        .chart-title {
            color: #0f0;
            font-size: 10px;
            margin-bottom: 15px;
            text-align: center;
        }

        .category-stats {
            background: #111;
            border: 2px solid #ff0;
            padding: 15px;
            margin-top: 20px;
        }

        .category-stat-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .category-stat-name {
            width: 100px;
            color: #ff0;
            font-size: 8px;
        }

        .category-stat-bar {
            flex: 1;
            height: 10px;
            background: #333;
            border: 1px solid #0f0;
        }

        .category-stat-fill {
            height: 100%;
            background: #0f0;
            width: 0%;
        }

        .category-stat-count {
            color: #0f0;
            font-size: 8px;
        }

        /* Actions admin */
        .admin-actions {
            max-width: 1400px;
            margin: 20px auto;
            padding: 0 20px;
            display: flex;
            gap: 15px;
        }

        .add-video-btn, .export-btn {
            background: #000;
            border: 4px solid #ff0;
            color: #ff0;
            padding: 15px 30px;
            font-size: 12px;
            font-family: 'Press Start 2P', cursive;
            cursor: pointer;
            image-rendering: pixelated;
            transition: all 0.1s;
            text-transform: uppercase;
        }

        .add-video-btn:hover, .export-btn:hover {
            background: #ff0;
            color: #000;
            box-shadow: 0 0 20px #ff0;
        }

        .export-btn {
            border-color: #0f0;
            color: #0f0;
        }

        .export-btn:hover {
            background: #0f0;
            color: #000;
        }

        /* Modals */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #000;
            border: 4px solid #ff0;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-content::before {
            content: "★";
            position: absolute;
            top: -15px;
            left: 20px;
            background: #000;
            color: #ff0;
            padding: 0 10px;
            font-size: 20px;
        }

        .modal-content h2 {
            color: #ff0;
            font-size: 14px;
            margin-bottom: 20px;
            text-align: center;
        }

        .modal-content input,
        .modal-content textarea,
        .modal-content select {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            background: #111;
            border: 2px solid #0f0;
            color: #0f0;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
        }

        .categories-selector {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .category-checkbox {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #ff0;
            font-size: 8px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .modal-buttons button {
            padding: 10px 20px;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            cursor: pointer;
            border: 2px solid;
        }

        .save-btn {
            background: #0f0;
            border-color: #ff0;
            color: #000;
        }

        .cancel-btn {
            background: #f00;
            border-color: #ff0;
            color: #fff;
        }

        /* Grille des vidéos */
        .videos-container {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
        }

        /* Cartes vidéo */
        .video-card {
            background: #000;
            border: 4px solid #0f0;
            padding: 10px;
            position: relative;
            image-rendering: pixelated;
            transition: all 0.2s;
        }

        .video-card:hover {
            border-color: #ff0;
            transform: translateY(-5px);
            box-shadow: 0 0 30px #0f0;
        }

        .video-card::after {
            content: "★";
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            background: #000;
            color: #ff0;
            font-size: 20px;
            padding: 0 10px;
        }

        .thumbnail-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            border: 2px solid #ff0;
            margin-bottom: 10px;
            cursor: pointer;
            overflow: hidden;
        }

        .thumbnail {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            image-rendering: pixelated;
        }

        .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .thumbnail-container:hover .play-overlay {
            opacity: 1;
        }

        .play-button {
            width: 50px;
            height: 50px;
            background: #ff0000;
            color: #fff;
            font-size: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid #ff0;
            box-shadow: 0 0 20px #ff0000;
        }

        .video-categories {
            position: absolute;
            top: 10px;
            left: 10px;
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            z-index: 10;
        }

        .video-category-badge {
            background: #000;
            border: 2px solid #ff0;
            color: #ff0;
            padding: 3px 8px;
            font-size: 6px;
            text-transform: uppercase;
        }

        .video-info {
            padding: 15px 10px;
        }

        .video-title {
            color: #0f0;
            font-size: 10px;
            margin: 10px 0;
            line-height: 1.4;
            cursor: pointer;
            transition: color 0.2s;
        }

        .video-title:hover {
            color: #ff0;
        }

        .video-description {
            color: #888;
            font-size: 7px;
            margin: 10px 0;
            line-height: 1.4;
        }

        .video-meta {
            display: flex;
            justify-content: space-between;
            color: #ff0;
            margin: 10px 0;
            font-size: 7px;
        }

        .video-views {
            color: #0f0;
        }

        .video-stats {
            display: flex;
            gap: 15px;
            margin: 15px 0;
        }

        .like-button {
            background: #000;
            border: 2px solid #ff0;
            color: #ff0;
            padding: 5px 10px;
            font-size: 8px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: all 0.2s;
        }

        .like-button:hover {
            background: #ff0;
            color: #000;
        }

        .like-button.liked {
            background: #ff0;
            color: #000;
            border-color: #f00;
        }

        .admin-controls {
            display: none;
            gap: 10px;
            margin: 15px 0;
        }

        .admin-controls.show {
            display: flex;
        }

        .edit-btn, .delete-btn {
            padding: 8px 15px;
            font-family: 'Press Start 2P', cursive;
            font-size: 7px;
            cursor: pointer;
            border: 2px solid;
        }

        .edit-btn {
            background: #00f;
            border-color: #ff0;
            color: #fff;
        }

        .delete-btn {
            background: #f00;
            border-color: #ff0;
            color: #fff;
        }

        /* Commentaires */
        .comments-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #ff0;
        }

        .comments-title {
            color: #ff0;
            font-size: 8px;
            margin-bottom: 15px;
        }

        .comment-form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .comment-input {
            flex: 1;
            padding: 8px;
            background: #111;
            border: 2px solid #0f0;
            color: #0f0;
            font-family: 'Press Start 2P', cursive;
            font-size: 7px;
        }

        .comment-submit {
            padding: 8px 15px;
            background: #0f0;
            border: 2px solid #ff0;
            color: #000;
            font-family: 'Press Start 2P', cursive;
            font-size: 7px;
            cursor: pointer;
        }

        .comments-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .comment {
            background: #111;
            border-left: 4px solid #ff0;
            padding: 10px;
            margin-bottom: 10px;
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        .comment-author {
            color: #0f0;
            font-size: 7px;
        }

        .comment-date {
            color: #888;
            font-size: 6px;
        }

        .comment-text {
            color: #fff;
            font-size: 7px;
            line-height: 1.4;
        }

        .delete-comment {
            color: #f00;
            cursor: pointer;
            font-size: 7px;
            margin-left: 10px;
        }

        /* Lecteur vidéo */
        .video-player {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 3000;
            justify-content: center;
            align-items: center;
        }

        .video-player.active {
            display: flex;
        }

        .player-container {
            position: relative;
            width: 90%;
            max-width: 1000px;
            background: #000;
            border: none;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
        }

        .close-player {
            position: absolute;
            top: -20px;
            right: -20px;
            background: #f00;
            border: 2px solid #ff0;
            color: #fff;
            width: 40px;
            height: 40px;
            font-size: 20px;
            cursor: pointer;
            z-index: 10;
            font-family: 'Press Start 2P', cursive;
        }

        .player-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
        }

        #youtube-player {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* Footer */
        footer {
            border-top: 4px solid #ff0;
            padding: 30px;
            text-align: center;
            color: #666;
            font-size: 8px;
            margin-top: 40px;
        }

        /* Messages */
        .error-message {
            color: #f00;
            font-size: 8px;
            margin-bottom: 15px;
        }

        .no-videos {
            text-align: center;
            padding: 60px;
            background: #111;
            border: 4px solid #ff0;
            grid-column: 1/-1;
        }

        .no-videos h2 {
            color: #ff0;
            font-size: 16px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div style="display: flex; flex-direction: column;">
                <a href="https://www.youtube.com/@spykotwitch2532" target="_blank" class="logo" style="text-decoration: none;">
                    <span>▶️</span>
                    <span style="color: #ff0000;">spyko.ytb</span>
                </a>
                <div class="subscribe-prompt">
                    <span class="subscribe-arrow">⬆️</span>
                    <span class="subscribe-text">Abonne toi !</span>
                </div>
            </div>
            
            <div class="search-section">
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="RECHERCHER..." onkeyup="filterVideos()">
                </div>
                <div class="categories-filter" id="categoriesFilter"></div>
            </div>
            
            <div class="user-section">
                <div class="user-info" id="userInfo">
                    <span class="user-badge">👑 ADMIN</span>
                    <button class="logout-btn" onclick="logout()">QUITTER</button>
                </div>
                <button class="login-btn" id="loginBtn" onclick="openLoginModal()">ADMIN</button>
            </div>
        </div>
    </header>

    <!-- Dashboard stats admin -->
    <div id="statsDashboard" style="display: none;">
        <div class="stats-dashboard">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="totalVideos">0</div>
                    <div class="stat-label">VIDÉOS</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalViews">0</div>
                    <div class="stat-label">VUES</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalLikes">0</div>
                    <div class="stat-label">LIKES</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalComments">0</div>
                    <div class="stat-label">COMMS</div>
                </div>
            </div>

            <div class="stats-charts">
                <div class="chart-container">
                    <div class="chart-title">TOP VIDÉOS</div>
                    <div id="topVideosList"></div>
                </div>
                
                <div class="chart-container">
                    <div class="chart-title">RÉCENT</div>
                    <div id="recentActivity"></div>
                </div>
            </div>

            <div class="category-stats">
                <div class="chart-title">CATÉGORIES</div>
                <div id="categoryStats"></div>
            </div>
        </div>
    </div>

    <!-- Actions admin -->
    <div class="admin-actions" id="adminActions" style="display: none;">
        <button class="add-video-btn" onclick="openAddModal()">➕ PUBLIER</button>
        <button class="export-btn" onclick="exportStats()">📊 STATS</button>
    </div>

    <!-- Modals -->
    <div class="modal" id="loginModal">
        <div class="modal-content">
            <h2>🔐 ADMIN</h2>
            <div class="error-message" id="loginError"></div>
            <input type="password" id="adminPassword" placeholder="MOT DE PASSE">
            <div class="modal-buttons">
                <button class="cancel-btn" onclick="closeLoginModal()">ANNULER</button>
                <button class="save-btn" onclick="checkPassword()">VALIDER</button>
            </div>
        </div>
    </div>

    <div class="modal" id="addVideoModal">
        <div class="modal-content">
            <h2>➕ NOUVELLE VIDÉO</h2>
            <input type="text" id="videoTitle" placeholder="TITRE">
            <textarea id="videoDescription" placeholder="DESCRIPTION" rows="3"></textarea>
            <input type="text" id="youtubeLink" placeholder="LIEN YOUTUBE">
            
            <h3 style="color:#ff0; font-size:10px; margin:10px 0;">CATÉGORIES</h3>
            <div class="categories-selector" id="categoriesSelector"></div>
            
            <div class="modal-buttons">
                <button class="cancel-btn" onclick="closeAddModal()">ANNULER</button>
                <button class="save-btn" onclick="addVideo()">PUBLIER</button>
            </div>
        </div>
    </div>

    <div class="modal" id="editVideoModal">
        <div class="modal-content">
            <h2>✏️ MODIFIER</h2>
            <input type="text" id="editVideoTitle" placeholder="TITRE">
            <textarea id="editVideoDescription" placeholder="DESCRIPTION" rows="3"></textarea>
            
            <h3 style="color:#ff0; font-size:10px; margin:10px 0;">CATÉGORIES</h3>
            <div class="categories-selector" id="editCategoriesSelector"></div>
            
            <div class="modal-buttons">
                <button class="cancel-btn" onclick="closeEditModal()">ANNULER</button>
                <button class="save-btn" onclick="saveEdit()">VALIDER</button>
            </div>
        </div>
    </div>

    <!-- Lecteur vidéo -->
    <div class="video-player" id="videoPlayer">
        <div class="player-container">
            <button class="close-player" onclick="closePlayer()">✕</button>
            <div class="player-wrapper">
                <div id="youtube-player"></div>
            </div>
        </div>
    </div>

    <!-- Grille des vidéos -->
    <div class="videos-container">
        <div class="videos-grid" id="videosGrid"></div>
    </div>

    <footer>
        <p>© 2026 - SPYKO.YTB ★ MES POV GAMING</p>
    </footer>

    <script>
        // ==================== CONFIGURATION ====================
        const ADMIN_PASSWORD = "SpYkO91420!";
        const CATEGORIES = ["FPS", "MMORPG", "ActionRPG"];
        
        // ==================== CONFIGURATION API GOOGLE SHEETS ====================
        // IMPORTANT: Remplace par ta vraie URL Apps Script
        const API_URL = 'https://script.google.com/macros/s/AKfycbzjgpi0_p1oA2UoKPy8wqPqzCZY1UuiOwa86Y0Qje3XGtfKn2W1ipGF36B8z2wCD0jt6A/exec'; // ← À REMPLACER !
        
        // ==================== ÉTAT ====================
        let videos = [];
        let isAdmin = localStorage.getItem('isAdmin') === 'true';
        let currentVideoId = null;
        let player = null;
        let editingIndex = null;
        let currentFilter = {
            search: '',
            category: null
        };

        // ==================== INITIALISATION ====================
        document.addEventListener('DOMContentLoaded', async () => {
             await loadVideos();  // Charge les vidéos UNE SEULE FOIS
            updateAdminUI();
            renderCategoriesFilter();
            renderCategoriesSelector();
            // Ne pas appeler filterVideos() ici, loadVideos() le fait déjà
        });

        // ==================== FONCTIONS API ====================
        
        async function loadVideos() {
            try {
                const response = await fetch(`${API_URL}?action=getAll`);
                const result = await response.json();
        
                if (result.meta.status === 200 && result.data) {
                    // NETTOYAGE : Supprimer les doublons basés sur l'ID
                    const uniqueVideos = [];
                    const seenIds = new Set();
            
                    result.data.forEach(video => {
                        if (!seenIds.has(video.id)) {
                            seenIds.add(video.id);
                            uniqueVideos.push(video);
                        }
                    });
            
                    console.log(`Nettoyage: ${result.data.length} vidéos trouvées, ${uniqueVideos.length} uniques`);
            
                    videos = uniqueVideos.map(video => ({
                        id: video.id || '',
                        title: video.title || 'Sans titre',
                        description: video.description || '',
                        videoId: video.videoId || '',
                        link: video.link || '',
                        date: video.date || new Date().toISOString(),
                        views: video.views || 0,
                        likes: video.likes || 0,
                        likedBy: video.likedBy || [],
                        categories: video.categories || [],
                        comments: video.comments || []
                    }));
            
                    console.log('Vidéos après nettoyage:', videos.length);
                } else {
                    console.error('Erreur API:', result.meta?.message || 'Données invalides');
                    videos = [];
                }
            } catch (error) {
                console.error('Erreur chargement vidéos:', error);
                videos = [];
            }
    
            filterVideos();
        }

        async function addVideo() {
            const title = document.getElementById('videoTitle')?.value.trim();
            const description = document.getElementById('videoDescription')?.value.trim();
            const link = document.getElementById('youtubeLink')?.value.trim();

            if (!title || !link) {
                alert('TITRE ET LIEN REQUIS');
                return;
            }

            const videoId = extractVideoId(link);
            if (!videoId) {
                alert('LIEN YOUTUBE INVALIDE');
                return;
            }

            const categories = [];
            document.querySelectorAll('#categoriesSelector input:checked').forEach(cb => {
                categories.push(cb.value);
            });

            const newVideo = {
                id: Date.now().toString(),
                title,
                description: description || '',
                link: `https://youtube.com/watch?v=${videoId}`,
                videoId,
                date: new Date().toISOString(),
                views: 0,
                likes: 0,
                likedBy: [],
                categories,
                comments: []
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'createVideo',
                        data: newVideo
                    })
                });
                
                const result = await response.json();
                
                if (result.meta.status === 201 || result.meta.status === 200) {
                    await loadVideos();
                    closeAddModal();
                    alert('Vidéo publiée avec succès !');
                } else {
                    alert('Erreur lors de la publication');
                }
            } catch (error) {
                console.error('Erreur:', error);
                alert('Erreur réseau');
            }
        }

        async function updateVideo(id, updatedData) {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'updateVideo',
                        id: id,
                        data: updatedData
                    })
                });
                
                const result = await response.json();
                
                if (result.meta.status === 200) {
                    await loadVideos();
                    return true;
                }
                return false;
            } catch (error) {
                console.error('Erreur update:', error);
                return false;
            }
        }

        async function deleteVideo(index) {
            if (!isAdmin) return;
            
            const video = videos[index];
            if (!video) return;
            
            if (confirm('SUPPRIMER ?')) {
                try {
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            action: 'deleteVideo',
                            id: video.id
                        })
                    });
                    
                    const result = await response.json();
                    
                    if (result.meta.status === 200) {
                        await loadVideos();
                        if (isAdmin) updateStats();
                    }
                } catch (error) {
                    console.error('Erreur suppression:', error);
                }
            }
        }

        async function incrementViews(index) {
            const video = videos[index];
            if (!video || !video.videoId) return;
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'addView',
                        videoId: video.videoId
                    })
                });
                
                const result = await response.json();
                
                if (result.meta.status === 200) {
                    video.views = result.data.newViews;
                    filterVideos();
                    if (isAdmin) updateStats();
                }
            } catch (error) {
                console.error('Erreur vue:', error);
            }
        }

        async function toggleLike(videoIndex) {
            const video = videos[videoIndex];
            if (!video || !video.videoId) return;
            
            const viewerId = localStorage.getItem('visitorId') || 'visiteur_' + Date.now();
            
            if (!localStorage.getItem('visitorId')) {
                localStorage.setItem('visitorId', viewerId);
            }

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'toggleLike',
                        videoId: video.videoId,
                        viewerId: viewerId
                    })
                });
                
                const result = await response.json();
                
                if (result.meta.status === 200) {
                    video.likes = result.data.newLikes;
                    if (result.data.hasLiked) {
                        video.likedBy = (video.likedBy || []).filter(id => id !== viewerId);
                    } else {
                        if (!video.likedBy) video.likedBy = [];
                        video.likedBy.push(viewerId);
                    }
                    
                    filterVideos();
                    if (isAdmin) updateStats();
                }
            } catch (error) {
                console.error('Erreur like:', error);
            }
        }

        async function addComment(videoIndex) {
            const input = document.getElementById(`comment-${videoIndex}`);
            if (!input) return;
            
            const text = input.value.trim();
            if (!text) return;

            const video = videos[videoIndex];
            if (!video || !video.videoId) return;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'addComment',
                        videoId: video.videoId,
                        comment: {
                            author: "JOUEUR",
                            text: text
                        }
                    })
                });
                
                const result = await response.json();
                
                if (result.meta.status === 201 || result.meta.status === 200) {
                    if (!video.comments) video.comments = [];
                    video.comments.push(result.data);
                    input.value = '';
                    filterVideos();
                    if (isAdmin) updateStats();
                }
            } catch (error) {
                console.error('Erreur commentaire:', error);
            }
        }

        async function deleteComment(videoIndex, commentId) {
            if (!isAdmin) return;
            
            const video = videos[videoIndex];
            if (!video || !video.videoId) return;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'deleteComment',
                        videoId: video.videoId,
                        commentId: commentId
                    })
                });
                
                const result = await response.json();
                
                if (result.meta.status === 200) {
                    video.comments = (video.comments || []).filter(c => c.id !== commentId);
                    filterVideos();
                    updateStats();
                }
            } catch (error) {
                console.error('Erreur suppression commentaire:', error);
            }
        }

        // ==================== FILTRES ====================
        function filterVideos() {
            const searchInput = document.getElementById('searchInput');
            const searchTerm = searchInput ? searchInput.value.toLowerCase() : '';
            
            const filtered = videos.filter(video => {
                const title = video.title || '';
                const description = video.description || '';
                const categories = video.categories || [];
                
                const matchesSearch = title.toLowerCase().includes(searchTerm) ||
                                     description.toLowerCase().includes(searchTerm);
                const matchesCategory = !currentFilter.category || 
                                       categories.includes(currentFilter.category);
                
                return matchesSearch && matchesCategory;
            });
            
            displayVideos(filtered);
        }

        function filterByCategory(category) {
            currentFilter.category = category;
            document.querySelectorAll('.category-tag').forEach(el => {
                el.classList.remove('active');
                if ((!category && el.textContent === 'TOUS') || el.textContent === category) {
                    el.classList.add('active');
                }
            });
            filterVideos();
        }

        function resetFilters() {
            const searchInput = document.getElementById('searchInput');
            if (searchInput) searchInput.value = '';
            currentFilter = { search: '', category: null };
            document.querySelectorAll('.category-tag').forEach(el => el.classList.remove('active'));
            const firstTag = document.querySelector('.category-tag');
            if (firstTag) firstTag.classList.add('active');
            filterVideos();
        }

        // ==================== AUTHENTIFICATION ====================
        function openLoginModal() {
            const modal = document.getElementById('loginModal');
            if (modal) modal.classList.add('active');
            const passwordInput = document.getElementById('adminPassword');
            if (passwordInput) passwordInput.value = '';
            const errorDiv = document.getElementById('loginError');
            if (errorDiv) errorDiv.textContent = '';
        }

        function closeLoginModal() {
            const modal = document.getElementById('loginModal');
            if (modal) modal.classList.remove('active');
        }

        function checkPassword() {
            const passwordInput = document.getElementById('adminPassword');
            const password = passwordInput ? passwordInput.value : '';
            
            if (password === ADMIN_PASSWORD) {
                isAdmin = true;
                localStorage.setItem('isAdmin', 'true');
                closeLoginModal();
                updateAdminUI();
                filterVideos();
            } else {
                const errorDiv = document.getElementById('loginError');
                if (errorDiv) errorDiv.textContent = 'ERREUR';
            }
        }

        function logout() {
            isAdmin = false;
            localStorage.removeItem('isAdmin');
            updateAdminUI();
            filterVideos();
        }

        function updateAdminUI() {
            const userInfo = document.getElementById('userInfo');
            const loginBtn = document.getElementById('loginBtn');
            const adminActions = document.getElementById('adminActions');
            const statsDashboard = document.getElementById('statsDashboard');
            
            if (userInfo) userInfo.classList.toggle('admin', isAdmin);
            if (loginBtn) loginBtn.style.display = isAdmin ? 'none' : 'block';
            if (adminActions) adminActions.style.display = isAdmin ? 'flex' : 'none';
            if (statsDashboard) statsDashboard.style.display = isAdmin ? 'block' : 'none';
            
            if (isAdmin) {
                updateStats();
            }
        }

        // ==================== STATISTIQUES ====================
        function updateStats() {
            const totalVideos = document.getElementById('totalVideos');
            const totalViews = document.getElementById('totalViews');
            const totalLikes = document.getElementById('totalLikes');
            const totalComments = document.getElementById('totalComments');
            
            if (totalVideos) totalVideos.textContent = videos.length;
            if (totalViews) totalViews.textContent = videos.reduce((sum, v) => sum + (v.views || 0), 0);
            if (totalLikes) totalLikes.textContent = videos.reduce((sum, v) => sum + (v.likes || 0), 0);
            if (totalComments) totalComments.textContent = videos.reduce((sum, v) => sum + (v.comments?.length || 0), 0);

            const topVideos = [...videos].sort((a, b) => (b.views || 0) - (a.views || 0)).slice(0, 5);
            const topVideosList = document.getElementById('topVideosList');
            if (topVideosList) {
                topVideosList.innerHTML = topVideos.map(v => `
                    <div style="margin-bottom:10px; padding:10px; background:#000; border:1px solid #0f0;">
                        <div style="color:#0f0; font-size:7px;">${v.title || 'Sans titre'}</div>
                        <div style="color:#ff0; font-size:6px;">👁️ ${v.views || 0} ❤️ ${v.likes || 0}</div>
                    </div>
                `).join('');
            }

            const recent = [...videos].sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0)).slice(0, 5);
            const recentActivity = document.getElementById('recentActivity');
            if (recentActivity) {
                recentActivity.innerHTML = recent.map(v => `
                    <div style="margin-bottom:10px; padding:10px; background:#000; border:1px solid #ff0;">
                        <div style="color:#ff0; font-size:7px;">${v.title || 'Sans titre'}</div>
                        <div style="color:#0f0; font-size:6px;">📅 ${new Date(v.date || Date.now()).toLocaleDateString()}</div>
                    </div>
                `).join('');
            }

            const categoryStats = {};
            CATEGORIES.forEach(cat => categoryStats[cat] = 0);
            videos.forEach(video => {
                (video.categories || []).forEach(cat => {
                    categoryStats[cat] = (categoryStats[cat] || 0) + 1;
                });
            });

            const maxCount = Math.max(...Object.values(categoryStats), 1);
            const categoryStatsDiv = document.getElementById('categoryStats');
            if (categoryStatsDiv) {
                categoryStatsDiv.innerHTML = Object.entries(categoryStats)
                    .map(([cat, count]) => `
                        <div class="category-stat-item">
                            <span class="category-stat-name">${cat}</span>
                            <div class="category-stat-bar">
                                <div class="category-stat-fill" style="width: ${(count / maxCount * 100)}%"></div>
                            </div>
                            <span class="category-stat-count">${count}</span>
                        </div>
                    `).join('');
            }
        }

        function exportStats() {
            const stats = {
                totalVideos: videos.length,
                totalViews: videos.reduce((sum, v) => sum + (v.views || 0), 0),
                totalLikes: videos.reduce((sum, v) => sum + (v.likes || 0), 0),
                videos: videos.map(v => ({
                    title: v.title,
                    views: v.views,
                    likes: v.likes,
                    comments: v.comments?.length || 0,
                    date: v.date
                }))
            };
            
            const blob = new Blob([JSON.stringify(stats, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'stats.json';
            a.click();
        }

        // ==================== FILTRES (UI) ====================
        function renderCategoriesFilter() {
            const container = document.getElementById('categoriesFilter');
            if (!container) return;
            
            const html = ['<span class="category-tag active" onclick="filterByCategory(null)">TOUS</span>'] + 
                CATEGORIES.map(cat => 
                    `<span class="category-tag" onclick="filterByCategory('${cat}')">${cat}</span>`
                ).join('');
            container.innerHTML = html;
        }

        // ==================== VIDÉOS ====================
        function renderCategoriesSelector() {
            const html = CATEGORIES.map(cat => `
                <label class="category-checkbox">
                    <input type="checkbox" value="${cat}"> ${cat}
                </label>
            `).join('');
            
            const selector = document.getElementById('categoriesSelector');
            const editSelector = document.getElementById('editCategoriesSelector');
            
            if (selector) selector.innerHTML = html;
            if (editSelector) editSelector.innerHTML = html;
        }

        function extractVideoId(url) {
            if (!url) return null;
            const patterns = [
                /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\n?#]+)/,
                /youtube\.com\/shorts\/([^&\n?#]+)/
            ];
            for (let pattern of patterns) {
                const match = url.match(pattern);
                if (match) return match[1];
            }
            return null;
        }

        function openAddModal() {
            const modal = document.getElementById('addVideoModal');
            if (modal) modal.classList.add('active');
            
            const titleInput = document.getElementById('videoTitle');
            const descInput = document.getElementById('videoDescription');
            const linkInput = document.getElementById('youtubeLink');
            
            if (titleInput) titleInput.value = '';
            if (descInput) descInput.value = '';
            if (linkInput) linkInput.value = '';
            
            document.querySelectorAll('#categoriesSelector input').forEach(cb => cb.checked = false);
        }

        function closeAddModal() {
            const modal = document.getElementById('addVideoModal');
            if (modal) modal.classList.remove('active');
        }

        function openEditModal(index) {
            const video = videos[index];
            if (!video) return;
            
            editingIndex = index;
            
            const titleInput = document.getElementById('editVideoTitle');
            const descInput = document.getElementById('editVideoDescription');
            
            if (titleInput) titleInput.value = video.title || '';
            if (descInput) descInput.value = video.description || '';
            
            document.querySelectorAll('#editCategoriesSelector input').forEach(cb => {
                cb.checked = (video.categories || []).includes(cb.value);
            });
            
            const modal = document.getElementById('editVideoModal');
            if (modal) modal.classList.add('active');
        }

        function closeEditModal() {
            const modal = document.getElementById('editVideoModal');
            if (modal) modal.classList.remove('active');
            editingIndex = null;
        }

        async function saveEdit() {
            if (editingIndex === null) return;
            
            const titleInput = document.getElementById('editVideoTitle');
            const descInput = document.getElementById('editVideoDescription');
            
            const title = titleInput ? titleInput.value.trim() : '';
            if (!title) {
                alert('TITRE REQUIS');
                return;
            }

            const categories = [];
            document.querySelectorAll('#editCategoriesSelector input:checked').forEach(cb => {
                categories.push(cb.value);
            });

            const video = videos[editingIndex];
            const updatedData = {
                title,
                description: descInput ? descInput.value.trim() || '' : '',
                categories
            };

            const success = await updateVideo(video.id, updatedData);
            
            if (success) {
                closeEditModal();
                if (isAdmin) updateStats();
            } else {
                alert('Erreur lors de la modification');
            }
        }

        // ==================== LECTEUR ====================
        function loadYouTubeAPI() {
            if (!document.getElementById('youtube-api')) {
                const tag = document.createElement('script');
                tag.id = 'youtube-api';
                tag.src = 'https://www.youtube.com/iframe_api';
                document.head.appendChild(tag);
            }
        }

        window.onYouTubeIframeAPIReady = function() {
            if (currentVideoId) {
                initPlayer(currentVideoId);
            }
        };

        function initPlayer(videoId) {
            if (!window.YT) {
                currentVideoId = videoId;
                return;
            }
            if (player) player.destroy();
            player = new YT.Player('youtube-player', {
                videoId: videoId,
                events: { 'onReady': (event) => event.target.playVideo() }
            });
        }

        function playVideo(index) {
            const video = videos[index];
            if (!video || !video.videoId) return;
            
            incrementViews(index);
            
            const playerDiv = document.getElementById('videoPlayer');
            if (playerDiv) playerDiv.classList.add('active');
            
            loadYouTubeAPI();
            initPlayer(video.videoId);
        }

        function closePlayer() {
            const playerDiv = document.getElementById('videoPlayer');
            if (playerDiv) playerDiv.classList.remove('active');
            
            if (player) player.stopVideo();
        }

        // ==================== AFFICHAGE ====================
        function displayVideos(videosToShow) {
            const grid = document.getElementById('videosGrid');
            if (!grid) return;
            
            const viewerId = localStorage.getItem('visitorId');
            
            if (!videosToShow || videosToShow.length === 0) {
                grid.innerHTML = `
                    <div class="no-videos">
                        <h2>🎮 AUCUNE VIDÉO</h2>
                        ${isAdmin ? '<button class="add-video-btn" onclick="openAddModal()">PUBLIER</button>' : ''}
                    </div>
                `;
                return;
            }

            grid.innerHTML = videosToShow.map((video, idx) => {
                const originalIndex = videos.findIndex(v => v.id === video.id);
                const hasLiked = viewerId && (video.likedBy || []).includes(viewerId);
                
                return `
                    <div class="video-card">
                        <div class="thumbnail-container" onclick="playVideo(${originalIndex})">
                            <img class="thumbnail" src="https://img.youtube.com/vi/${video.videoId || ''}/hqdefault.jpg" 
                                 onerror="this.src='https://img.youtube.com/vi/${video.videoId || ''}/mqdefault.jpg'; this.onerror=null;">
                            <div class="play-overlay">
                                <div class="play-button">▶</div>
                            </div>
                            ${(video.categories || []).length ? `
                                <div class="video-categories">
                                    ${video.categories.map(cat => 
                                        `<span class="video-category-badge">${cat}</span>`
                                    ).join('')}
                                </div>
                            ` : ''}
                        </div>
                        
                        <div class="video-info">
                            <h3 class="video-title" onclick="playVideo(${originalIndex})">${video.title || 'Sans titre'}</h3>
                            <p class="video-description">${video.description || 'PAS DE DESCRIPTION'}</p>
                            
                            <div class="video-meta">
                                <span class="video-views">👁️ ${video.views || 0}</span>
                                <span>📅 ${new Date(video.date || Date.now()).toLocaleDateString()}</span>
                            </div>

                            <div class="video-stats">
                                <div class="like-button ${hasLiked ? 'liked' : ''}" onclick="toggleLike(${originalIndex})">
                                    <span>❤️</span>
                                    <span>${video.likes || 0}</span>
                                </div>
                            </div>

                            ${isAdmin ? `
                                <div class="admin-controls show">
                                    <button class="edit-btn" onclick="openEditModal(${originalIndex})">✏️ MODIF</button>
                                    <button class="delete-btn" onclick="deleteVideo(${originalIndex})">🗑️ SUP</button>
                                </div>
                            ` : ''}

                            <div class="comments-section">
                                <div class="comments-title">💬 COMMS (${video.comments?.length || 0})</div>
                                
                                <div class="comment-form">
                                    <input type="text" class="comment-input" id="comment-${originalIndex}" 
                                           placeholder="COMMENTAIRE..." 
                                           onkeypress="if(event.key==='Enter') addComment(${originalIndex})">
                                    <button class="comment-submit" onclick="addComment(${originalIndex})">→</button>
                                </div>

                                <div class="comments-list">
                                    ${(video.comments || []).map(comment => `
                                        <div class="comment">
                                            <div class="comment-header">
                                                <span class="comment-author">${comment.author || 'Anonyme'}</span>
                                                <span class="comment-date">${comment.date || ''}</span>
                                                ${isAdmin ? `
                                                    <span class="delete-comment" onclick="deleteComment(${originalIndex}, ${comment.id})">✕</span>
                                                ` : ''}
                                            </div>
                                            <div class="comment-text">${comment.text || ''}</div>
                                        </div>
                                    `).join('') || ''}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ==================== UTILITAIRES ====================
        window.onclick = (event) => {
            if (event.target.classList.contains('modal')) {
                event.target.classList.remove('active');
            }
        };
    </script>
</body>
</html>
