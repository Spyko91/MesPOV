<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spyko.ytb - Mes POV Gaming</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Press Start 2P', cursive;
        }

        body {
            background: #000;
            color: #fff;
            font-size: 12px;
            line-height: 1.6;
            position: relative;
        }

        /* Effet scanlines rétro */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, 
                rgba(0, 0, 0, 0.1) 0px, 
                rgba(255, 255, 0, 0.03) 2px, 
                transparent 3px, 
                transparent 5px);
            pointer-events: none;
            z-index: 9999;
            transition: opacity 0.3s;
        }

        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, transparent 0%, rgba(0, 0, 0, 0.4) 100%);
            pointer-events: none;
            z-index: 9998;
            transition: opacity 0.3s;
        }

        .video-player.active ~ body::before,
        .video-player.active ~ body::after {
            opacity: 0 !important;
        }

        /* Animations */
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        @keyframes glow {
            0%, 100% { text-shadow: 0 0 5px #0f0; }
            50% { text-shadow: 0 0 15px #0f0, 0 0 30px #0f0; }
        }

        @keyframes arrowBounce {
            0%, 100% { transform: rotate(-10deg) translateX(0); }
            50% { transform: rotate(-10deg) translateX(-5px); }
        }

        .subscribe-prompt {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
            animation: bounce 1s infinite;
        }

        .subscribe-arrow {
            color: #ff0;
            font-size: 14px;
            transform: rotate(-10deg);
            animation: arrowBounce 0.8s infinite;
            filter: drop-shadow(0 0 5px #ff0);
        }

        .subscribe-text {
            color: #0f0;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1px;
            animation: glow 1.5s infinite;
            background: rgba(0, 0, 0, 0.5);
            padding: 3px 8px;
            border-radius: 10px;
            border: 1px solid #0f0;
        }

        .subscribe-text:hover {
            background: #0f0;
            color: #000;
        }

        header {
            background: #000;
            border-bottom: 4px solid #ff0;
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo {
            font-size: 16px;
            color: #ff0;
            text-transform: uppercase;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.2s;
            text-shadow: 2px 2px 0 #f00;
        }

        .logo:hover {
            color: #f00;
            text-shadow: 2px 2px 0 #ff0;
        }

        .logo span:first-child {
            font-size: 32px;
            color: #ff0000;
            filter: drop-shadow(0 0 10px #ff0000);
        }

        .logo:hover span:first-child {
            filter: drop-shadow(0 0 20px #ff0000);
            transform: scale(1.1);
        }

        .search-section {
            flex: 1;
            max-width: 500px;
        }

        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .search-bar input {
            flex: 1;
            padding: 10px;
            background: #111;
            border: 2px solid #ff0;
            color: #ff0;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
        }

        .categories-filter {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        .category-tag {
            display: inline-block;
            background: #000;
            border: 2px solid #0f0;
            color: #0f0;
            padding: 5px 10px;
            margin: 2px;
            font-size: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .category-tag:hover, .category-tag.active {
            background: #0f0;
            color: #000;
        }

        .user-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .login-btn {
            background: #000;
            border: 2px solid #ff0;
            color: #ff0;
            padding: 8px 15px;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            cursor: pointer;
        }

        .login-btn:hover {
            background: #ff0;
            color: #000;
        }

        .user-info {
            display: none;
            align-items: center;
            gap: 10px;
        }

        .user-info.admin {
            display: flex;
        }

        .user-badge {
            background: #ff0;
            color: #000;
            padding: 5px 10px;
            font-size: 8px;
            border: 2px solid #f00;
        }

        .logout-btn {
            background: #f00;
            border: 2px solid #ff0;
            color: #fff;
            padding: 5px 10px;
            font-family: 'Press Start 2P', cursive;
            font-size: 8px;
            cursor: pointer;
        }

        .admin-actions {
            max-width: 1400px;
            margin: 20px auto;
            padding: 0 20px;
            display: flex;
            gap: 15px;
        }

        .add-video-btn {
            background: #000;
            border: 4px solid #ff0;
            color: #ff0;
            padding: 15px 30px;
            font-size: 12px;
            font-family: 'Press Start 2P', cursive;
            cursor: pointer;
            text-transform: uppercase;
        }

        .add-video-btn:hover {
            background: #ff0;
            color: #000;
        }

        .videos-container {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
        }

        .video-card {
            background: #000;
            border: 4px solid #0f0;
            padding: 10px;
            position: relative;
            transition: all 0.2s;
        }

        .video-card:hover {
            border-color: #ff0;
            transform: translateY(-5px);
        }

        .video-card::after {
            content: "★";
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            background: #000;
            color: #ff0;
            font-size: 20px;
            padding: 0 10px;
        }

        .thumbnail-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            border: 2px solid #ff0;
            margin-bottom: 10px;
            cursor: pointer;
            overflow: hidden;
        }

        .thumbnail {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .thumbnail-container:hover .play-overlay {
            opacity: 1;
        }

        .play-button {
            width: 50px;
            height: 50px;
            background: #ff0000;
            color: #fff;
            font-size: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid #ff0;
        }

        .video-categories {
            position: absolute;
            top: 10px;
            left: 10px;
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            z-index: 10;
        }

        .video-category-badge {
            background: #000;
            border: 2px solid #ff0;
            color: #ff0;
            padding: 3px 8px;
            font-size: 6px;
        }

        .video-info {
            padding: 15px 10px;
        }

        .video-title {
            color: #0f0;
            font-size: 10px;
            margin: 10px 0;
            cursor: pointer;
        }

        .video-title:hover {
            color: #ff0;
        }

        .video-description {
            color: #888;
            font-size: 7px;
            margin: 10px 0;
        }

        .video-meta {
            display: flex;
            justify-content: space-between;
            color: #ff0;
            margin: 10px 0;
            font-size: 7px;
        }

        .admin-controls {
            display: none;
            gap: 10px;
            margin-top: 15px;
        }

        .admin-controls.show {
            display: flex;
        }

        .edit-btn, .delete-btn {
            padding: 8px 15px;
            font-family: 'Press Start 2P', cursive;
            font-size: 7px;
            cursor: pointer;
            border: 2px solid;
        }

        .edit-btn {
            background: #00f;
            border-color: #ff0;
            color: #fff;
        }

        .delete-btn {
            background: #f00;
            border-color: #ff0;
            color: #fff;
        }

        .video-player {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 3000;
            justify-content: center;
            align-items: center;
        }

        .video-player.active {
            display: flex;
        }

        .player-container {
            position: relative;
            width: 90%;
            max-width: 1000px;
            background: #000;
            border: none;
        }

        .close-player {
            position: absolute;
            top: -20px;
            right: -20px;
            background: #f00;
            border: 2px solid #ff0;
            color: #fff;
            width: 40px;
            height: 40px;
            font-size: 20px;
            cursor: pointer;
            z-index: 10;
        }

        .player-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
        }

        #youtube-player {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        footer {
            border-top: 4px solid #ff0;
            padding: 30px;
            text-align: center;
            color: #666;
            font-size: 8px;
            margin-top: 40px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #000;
            border: 4px solid #ff0;
            padding: 40px;
            max-width: 500px;
            width: 90%;
        }

        .modal-content h2 {
            color: #ff0;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .modal-content input,
        .modal-content textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            background: #111;
            border: 2px solid #0f0;
            color: #0f0;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
        }

        .categories-selector {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .category-checkbox {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #ff0;
            font-size: 8px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .save-btn {
            background: #0f0;
            border: 2px solid #ff0;
            color: #000;
            padding: 10px 20px;
            cursor: pointer;
        }

        .cancel-btn {
            background: #f00;
            border: 2px solid #ff0;
            color: #fff;
            padding: 10px 20px;
            cursor: pointer;
        }

        .no-videos {
            text-align: center;
            padding: 60px;
            background: #111;
            border: 4px solid #ff0;
            grid-column: 1/-1;
        }

        .error-message {
            color: #f00;
            font-size: 8px;
            margin-bottom: 15px;
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
            }
            .videos-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div style="display: flex; flex-direction: column;">
                <a href="https://www.youtube.com/@spykotwitch2532" target="_blank" class="logo" style="text-decoration: none;">
                    <span>▶️</span>
                    <span style="color: #ff0000;">spyko.ytb</span>
                </a>
                <div class="subscribe-prompt">
                    <span class="subscribe-arrow">⬆️</span>
                    <span class="subscribe-text">Abonne toi !</span>
                </div>
            </div>
            
            <div class="search-section">
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="RECHERCHER..." onkeyup="filterVideos()">
                </div>
                <div class="categories-filter" id="categoriesFilter"></div>
            </div>
            
            <div class="user-section">
                <div class="user-info" id="userInfo">
                    <span class="user-badge">👑 ADMIN</span>
                    <button class="logout-btn" onclick="logout()">QUITTER</button>
                </div>
                <button class="login-btn" id="loginBtn" onclick="openLoginModal()">ADMIN</button>
            </div>
        </div>
    </header>

    <!-- Actions admin -->
    <div class="admin-actions" id="adminActions" style="display: none;">
        <button class="add-video-btn" onclick="openAddModal()">➕ PUBLIER</button>
    </div>

    <!-- Modals -->
    <div class="modal" id="loginModal">
        <div class="modal-content">
            <h2>🔐 ADMIN</h2>
            <div class="error-message" id="loginError"></div>
            <input type="password" id="adminPassword" placeholder="MOT DE PASSE">
            <div class="modal-buttons">
                <button class="cancel-btn" onclick="closeLoginModal()">ANNULER</button>
                <button class="save-btn" onclick="checkPassword()">VALIDER</button>
            </div>
        </div>
    </div>

    <div class="modal" id="addVideoModal">
        <div class="modal-content">
            <h2>➕ NOUVELLE VIDÉO</h2>
            <input type="text" id="videoTitle" placeholder="TITRE">
            <textarea id="videoDescription" placeholder="DESCRIPTION" rows="3"></textarea>
            <input type="text" id="youtubeLink" placeholder="LIEN YOUTUBE">
            
            <h3 style="color:#ff0; font-size:10px; margin:10px 0;">CATÉGORIES</h3>
            <div class="categories-selector" id="categoriesSelector"></div>
            
            <div class="modal-buttons">
                <button class="cancel-btn" onclick="closeAddModal()">ANNULER</button>
                <button class="save-btn" onclick="addVideo()">PUBLIER</button>
            </div>
        </div>
    </div>

    <div class="modal" id="editVideoModal">
        <div class="modal-content">
            <h2>✏️ MODIFIER</h2>
            <input type="text" id="editVideoTitle" placeholder="TITRE">
            <textarea id="editVideoDescription" placeholder="DESCRIPTION" rows="3"></textarea>
            
            <h3 style="color:#ff0; font-size:10px; margin:10px 0;">CATÉGORIES</h3>
            <div class="categories-selector" id="editCategoriesSelector"></div>
            
            <div class="modal-buttons">
                <button class="cancel-btn" onclick="closeEditModal()">ANNULER</button>
                <button class="save-btn" onclick="saveEdit()">VALIDER</button>
            </div>
        </div>
    </div>

    <!-- Lecteur vidéo -->
    <div class="video-player" id="videoPlayer">
        <div class="player-container">
            <button class="close-player" onclick="closePlayer()">✕</button>
            <div class="player-wrapper">
                <div id="youtube-player"></div>
            </div>
        </div>
    </div>

    <!-- Grille des vidéos -->
    <div class="videos-container">
        <div class="videos-grid" id="videosGrid"></div>
    </div>

    <footer>
        <p>© 2026 - SPYKO.YTB ★ MES POV GAMING</p>
    </footer>

    <script>
        // ==================== CONFIGURATION ====================
        const ADMIN_PASSWORD = "SpYkO91420!";
        const CATEGORIES = ["FPS", "MMORPG", "ActionRPG"];
        
        // ==================== CONFIGURATION API ====================
        const API_URL = 'https://script.google.com/macros/s/AKfycbzFaJDrzPCwC2mRVEmyYyOZEfWR5lyIqwPPs7SZUH3mpemFi84zN8YP-P7wWiR3kqUo/exec';
        
        // ==================== ÉTAT ====================
        let videos = [];
        let isAdmin = localStorage.getItem('isAdmin') === 'true';
        let currentVideoId = null;
        let player = null;
        let editingIndex = null;
        let currentFilter = {
            search: '',
            category: null
        };

        // ==================== INITIALISATION ====================
        document.addEventListener('DOMContentLoaded', async () => {
            await loadVideos();
            updateAdminUI();
            renderCategoriesFilter();
            renderCategoriesSelector();
        });

        // ==================== FONCTIONS API ====================
        
        async function loadVideos() {
            try {
                const response = await fetch(`${API_URL}?action=getAll`);
                const result = await response.json();
                
                if (result.meta.status === 200 && result.data) {
                    videos = result.data.map(video => ({
                        id: video.id || '',
                        title: video.title || 'Sans titre',
                        description: video.description || '',
                        videoId: video.videoId || '',
                        link: video.link || '',
                        date: video.date || new Date().toISOString(),
                        categories: video.categories || []
                    }));
                    console.log('Vidéos chargées:', videos.length);
                } else {
                    console.error('Erreur API:', result.meta?.message || 'Données invalides');
                    videos = [];
                }
            } catch (error) {
                console.error('Erreur chargement vidéos:', error);
                videos = [];
            }
            
            filterVideos();
        }

        async function addVideo() {
            const title = document.getElementById('videoTitle')?.value.trim();
            const description = document.getElementById('videoDescription')?.value.trim();
            const link = document.getElementById('youtubeLink')?.value.trim();

            if (!title || !link) {
                alert('TITRE ET LIEN REQUIS');
                return;
            }

            const videoId = extractVideoId(link);
            if (!videoId) {
                alert('LIEN YOUTUBE INVALIDE');
                return;
            }

            const categories = [];
            document.querySelectorAll('#categoriesSelector input:checked').forEach(cb => {
                categories.push(cb.value);
            });

            const newVideo = {
                id: Date.now().toString(),
                title,
                description: description || '',
                link: `https://youtube.com/watch?v=${videoId}`,
                videoId,
                date: new Date().toISOString(),
                categories
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'createVideo',
                        data: newVideo
                    })
                });
                
                const result = await response.json();
                
                if (result.meta.status === 201 || result.meta.status === 200) {
                    await loadVideos();
                    closeAddModal();
                    alert('Vidéo publiée avec succès !');
                } else {
                    alert('Erreur lors de la publication');
                }
            } catch (error) {
                console.error('Erreur:', error);
                alert('Erreur réseau');
            }
        }

        async function updateVideo(id, updatedData) {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'updateVideo',
                        id: id,
                        data: updatedData
                    })
                });
                
                const result = await response.json();
                
                if (result.meta.status === 200) {
                    await loadVideos();
                    return true;
                }
                return false;
            } catch (error) {
                console.error('Erreur update:', error);
                return false;
            }
        }

        async function deleteVideo(index) {
            if (!isAdmin) return;
            
            const video = videos[index];
            if (!video) return;
            
            if (confirm('SUPPRIMER ?')) {
                try {
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            action: 'deleteVideo',
                            id: video.id
                        })
                    });
                    
                    const result = await response.json();
                    
                    if (result.meta.status === 200) {
                        await loadVideos();
                    }
                } catch (error) {
                    console.error('Erreur suppression:', error);
                }
            }
        }

        // ==================== FILTRES ====================
        function filterVideos() {
            const searchInput = document.getElementById('searchInput');
            const searchTerm = searchInput ? searchInput.value.toLowerCase() : '';
            
            const filtered = videos.filter(video => {
                const title = video.title || '';
                const description = video.description || '';
                const categories = video.categories || [];
                
                const matchesSearch = title.toLowerCase().includes(searchTerm) ||
                                     description.toLowerCase().includes(searchTerm);
                const matchesCategory = !currentFilter.category || 
                                       categories.includes(currentFilter.category);
                
                return matchesSearch && matchesCategory;
            });
            
            displayVideos(filtered);
        }

        function filterByCategory(category) {
            currentFilter.category = category;
            document.querySelectorAll('.category-tag').forEach(el => {
                el.classList.remove('active');
                if ((!category && el.textContent === 'TOUS') || el.textContent === category) {
                    el.classList.add('active');
                }
            });
            filterVideos();
        }

        // ==================== AUTHENTIFICATION ====================
        function openLoginModal() {
            const modal = document.getElementById('loginModal');
            if (modal) modal.classList.add('active');
            const passwordInput = document.getElementById('adminPassword');
            if (passwordInput) passwordInput.value = '';
            const errorDiv = document.getElementById('loginError');
            if (errorDiv) errorDiv.textContent = '';
        }

        function closeLoginModal() {
            const modal = document.getElementById('loginModal');
            if (modal) modal.classList.remove('active');
        }

        function checkPassword() {
            const passwordInput = document.getElementById('adminPassword');
            const password = passwordInput ? passwordInput.value : '';
            
            if (password === ADMIN_PASSWORD) {
                isAdmin = true;
                localStorage.setItem('isAdmin', 'true');
                closeLoginModal();
                updateAdminUI();
                filterVideos();
            } else {
                const errorDiv = document.getElementById('loginError');
                if (errorDiv) errorDiv.textContent = 'ERREUR';
            }
        }

        function logout() {
            isAdmin = false;
            localStorage.removeItem('isAdmin');
            updateAdminUI();
            filterVideos();
        }

        function updateAdminUI() {
            const userInfo = document.getElementById('userInfo');
            const loginBtn = document.getElementById('loginBtn');
            const adminActions = document.getElementById('adminActions');
            
            if (userInfo) userInfo.classList.toggle('admin', isAdmin);
            if (loginBtn) loginBtn.style.display = isAdmin ? 'none' : 'block';
            if (adminActions) adminActions.style.display = isAdmin ? 'flex' : 'none';
        }

        // ==================== UI ====================
        function renderCategoriesFilter() {
            const container = document.getElementById('categoriesFilter');
            if (!container) return;
            
            const html = ['<span class="category-tag active" onclick="filterByCategory(null)">TOUS</span>'] + 
                CATEGORIES.map(cat => 
                    `<span class="category-tag" onclick="filterByCategory('${cat}')">${cat}</span>`
                ).join('');
            container.innerHTML = html;
        }

        function renderCategoriesSelector() {
            const html = CATEGORIES.map(cat => `
                <label class="category-checkbox">
                    <input type="checkbox" value="${cat}"> ${cat}
                </label>
            `).join('');
            
            const selector = document.getElementById('categoriesSelector');
            const editSelector = document.getElementById('editCategoriesSelector');
            
            if (selector) selector.innerHTML = html;
            if (editSelector) editSelector.innerHTML = html;
        }

        function extractVideoId(url) {
            if (!url) return null;
            const patterns = [
                /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\n?#]+)/,
                /youtube\.com\/shorts\/([^&\n?#]+)/
            ];
            for (let pattern of patterns) {
                const match = url.match(pattern);
                if (match) return match[1];
            }
            return null;
        }

        function openAddModal() {
            const modal = document.getElementById('addVideoModal');
            if (modal) modal.classList.add('active');
            
            const titleInput = document.getElementById('videoTitle');
            const descInput = document.getElementById('videoDescription');
            const linkInput = document.getElementById('youtubeLink');
            
            if (titleInput) titleInput.value = '';
            if (descInput) descInput.value = '';
            if (linkInput) linkInput.value = '';
            
            document.querySelectorAll('#categoriesSelector input').forEach(cb => cb.checked = false);
        }

        function closeAddModal() {
            const modal = document.getElementById('addVideoModal');
            if (modal) modal.classList.remove('active');
        }

        function openEditModal(index) {
            const video = videos[index];
            if (!video) return;
            
            editingIndex = index;
            
            const titleInput = document.getElementById('editVideoTitle');
            const descInput = document.getElementById('editVideoDescription');
            
            if (titleInput) titleInput.value = video.title || '';
            if (descInput) descInput.value = video.description || '';
            
            document.querySelectorAll('#editCategoriesSelector input').forEach(cb => {
                cb.checked = (video.categories || []).includes(cb.value);
            });
            
            const modal = document.getElementById('editVideoModal');
            if (modal) modal.classList.add('active');
        }

        function closeEditModal() {
            const modal = document.getElementById('editVideoModal');
            if (modal) modal.classList.remove('active');
            editingIndex = null;
        }

        async function saveEdit() {
            if (editingIndex === null) return;
            
            const titleInput = document.getElementById('editVideoTitle');
            const descInput = document.getElementById('editVideoDescription');
            
            const title = titleInput ? titleInput.value.trim() : '';
            if (!title) {
                alert('TITRE REQUIS');
                return;
            }

            const categories = [];
            document.querySelectorAll('#editCategoriesSelector input:checked').forEach(cb => {
                categories.push(cb.value);
            });

            const video = videos[editingIndex];
            const updatedData = {
                title,
                description: descInput ? descInput.value.trim() || '' : '',
                categories
            };

            const success = await updateVideo(video.id, updatedData);
            
            if (success) {
                closeEditModal();
            } else {
                alert('Erreur lors de la modification');
            }
        }

        // ==================== LECTEUR ====================
        function loadYouTubeAPI() {
            if (!document.getElementById('youtube-api')) {
                const tag = document.createElement('script');
                tag.id = 'youtube-api';
                tag.src = 'https://www.youtube.com/iframe_api';
                document.head.appendChild(tag);
            }
        }

        window.onYouTubeIframeAPIReady = function() {
            if (currentVideoId) {
                initPlayer(currentVideoId);
            }
        };

        function initPlayer(videoId) {
            if (!window.YT) {
                currentVideoId = videoId;
                return;
            }
            if (player) player.destroy();
            player = new YT.Player('youtube-player', {
                videoId: videoId,
                events: { 'onReady': (event) => event.target.playVideo() }
            });
        }

        function playVideo(index) {
            const video = videos[index];
            if (!video || !video.videoId) return;
            
            const playerDiv = document.getElementById('videoPlayer');
            if (playerDiv) playerDiv.classList.add('active');
            
            loadYouTubeAPI();
            initPlayer(video.videoId);
        }

        function closePlayer() {
            const playerDiv = document.getElementById('videoPlayer');
            if (playerDiv) playerDiv.classList.remove('active');
            if (player) player.stopVideo();
        }

        // ==================== AFFICHAGE ====================
        function displayVideos(videosToShow) {
            const grid = document.getElementById('videosGrid');
            if (!grid) return;
            
            if (!videosToShow || videosToShow.length === 0) {
                grid.innerHTML = `
                    <div class="no-videos">
                        <h2>🎮 AUCUNE VIDÉO</h2>
                        ${isAdmin ? '<button class="add-video-btn" onclick="openAddModal()">PUBLIER</button>' : ''}
                    </div>
                `;
                return;
            }

            grid.innerHTML = videosToShow.map((video, idx) => {
                const originalIndex = videos.findIndex(v => v.id === video.id);
                
                return `
                    <div class="video-card">
                        <div class="thumbnail-container" onclick="playVideo(${originalIndex})">
                            <img class="thumbnail" src="https://img.youtube.com/vi/${video.videoId || ''}/hqdefault.jpg" 
                                 onerror="this.src='https://img.youtube.com/vi/${video.videoId || ''}/mqdefault.jpg'; this.onerror=null;">
                            <div class="play-overlay">
                                <div class="play-button">▶</div>
                            </div>
                            ${(video.categories || []).length ? `
                                <div class="video-categories">
                                    ${video.categories.map(cat => 
                                        `<span class="video-category-badge">${cat}</span>`
                                    ).join('')}
                                </div>
                            ` : ''}
                        </div>
                        
                        <div class="video-info">
                            <h3 class="video-title" onclick="playVideo(${originalIndex})">${video.title || 'Sans titre'}</h3>
                            <p class="video-description">${video.description || 'PAS DE DESCRIPTION'}</p>
                            
                            <div class="video-meta">
                                <span>📅 ${new Date(video.date || Date.now()).toLocaleDateString()}</span>
                            </div>

                            ${isAdmin ? `
                                <div class="admin-controls show">
                                    <button class="edit-btn" onclick="openEditModal(${originalIndex})">✏️ MODIF</button>
                                    <button class="delete-btn" onclick="deleteVideo(${originalIndex})">🗑️ SUP</button>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        window.onclick = (event) => {
            if (event.target.classList.contains('modal')) {
                event.target.classList.remove('active');
            }
        };
    </script>
</body>
</html>
